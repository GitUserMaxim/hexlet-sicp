name: 'Треугольник Паскаля'
description: |
  <p>Приведенная ниже таблица называется треугольником Паскаля (Pascal’s triangle).</p>
  <pre><code>    1
     1 1
    1 2 1
   1 3 3 1
  1 4 6 4 1
     ...
  </code></pre>
  <p>Все числа по краям треугольника равны 1, а каждое число внутри треугольника равно сумме двух чисел над ним. Напишите процедуру, вычисляющую элементы треугольника Паскаля с помощью рекурсивного процесса.</p>

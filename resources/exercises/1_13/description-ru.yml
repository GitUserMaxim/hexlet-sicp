name: 'Числа Фибоначчи и золотое сечение'
description: |
  <p>Докажите, что 
  <code>Fib(n)</code>
   есть целое число, ближайшее к 
  <code>φⁿ/√5</code>
  , где 
  <code>φ = (1 + √5)/2</code>
  . Указание: пусть 
  <code>ψ = (1 - √5)/2</code>
  . С помощью определения чисел Фибоначчи (см. раздел 1.2.2) и индукции докажите, что 
  <code>Fib(n) = (φⁿ - ψⁿ)/√5</code>
  .
  </p>

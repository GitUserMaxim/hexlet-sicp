name: 'Размен 11 центов'
description: |
  <p>Нарисуйте дерево, иллюстрирующее процесс, который порождается процедурой 
  <code>count-change</code>
   из раздела 1.2.2 при размене 11 центов. Каковы порядки роста памяти и числа шагов, используемых этим процессом при увеличении суммы, которую требуется разменять?
  </p>

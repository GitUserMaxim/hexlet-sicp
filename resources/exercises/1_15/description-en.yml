name: 'The sine of an angle'
description: |
  <p>The sine of an angle (specified in radians) can be computed by making use of the approximation 
  <code>sin x ≈ x</code>
   if 
  <code>x</code>
   is sufficiently small, and the trigonometric identity
  </p>
  <pre><code>sin(x) = 3sin(x / 3) − 4sin³(x / 3)</code></pre>
  <p>to reduce the size of the argument of 
  <code>sin</code>
  . (For purposes of this exercise an angle is considered ''sufficiently small'' if its magnitude is not greater than 0.1 radians.) These ideas are incorporated in the following procedures:
  </p>
  <pre><code>(define (cube x) (* x x x))

  (define (p x) (- (* 3 x) (* 4 (cube x))))

  (define (sine angle)
     (if (not (> (abs angle) 0.1))
         angle
         (p (sine (/ angle 3.0)))))</code></pre>
  <p>a.  How many times is the procedure 
  <code>p</code>
   applied when 
  <code>(sine 12.15)</code>
   is evaluated?
  </p>
  <p>b.  What is the order of growth in space and number of steps (as a function of 
  <code>a</code>
  ) used by the process generated by the 
  <code>sine</code>
   procedure when 
  <code>(sine a)</code>
   is evaluated?
  </p>

name: 'Синус угла'
description: |
  <p>Синус угла (заданного в радианах) можно вычислить, если воспользоваться приближением 
  <code>sin x ≈ x</code>
   при малых 
  <code>x</code>
   и употребить тригонометрическое тождество
  </p>
  <pre><code>sin(x) = 3sin(x / 3) − 4sin³(x / 3)</code></pre>
  <p>для уменьшения значения аргумента 
  <code>sin</code>
  . (В этом упражнении мы будем считать, что угол «достаточно мал», если он не больше 0.1 радиана.) Эта идея используется в следующих процедурах:
  </p>
  <pre><code>(define (cube x) (* x x x))

  (define (p x) (- (* 3 x) (* 4 (cube x))))

  (define (sine angle)
     (if (not (> (abs angle) 0.1))
         angle
         (p (sine (/ angle 3.0)))))</code></pre>
  <p>а. Сколько раз вызывается процедура 
  <code>p</code>
   при вычислении 
  <code>(sine 12.15)</code>
  ?
  </p>
  <p>б. Каковы порядки роста в терминах количества шагов и используемой памяти (как функция 
  <code>a</code>
  ) для процесса, порождаемого процедурой 
  <code>sine</code>
   при вычислении 
  <code>(sine a)</code>
  ?
  </p>

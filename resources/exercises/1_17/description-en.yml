name: 'Multiplication by means of repeated addition'
description: |
  <p>The exponentiation algorithms in this section are based on performing exponentiation by means of repeated multiplication. In a similar way, one can perform integer multiplication by means of repeated addition. The following multiplication procedure (in which it is assumed that our language can only add, not multiply) is analogous to the 
  <code>expt</code>
   procedure:
  </p>
  <pre><code>(define (* a b)
    (if (= b 0)
        0
        (+ a (* a (- b 1)))))
  </code></pre>
  <p>This algorithm takes a number of steps that is linear in 
  <code>b</code>
  . Now suppose we include, together with addition, operations 
  <code>double</code>
  , which doubles an integer, and 
  <code>halve</code>
  , which divides an (even) integer by 2. Using these, design a multiplication procedure 
  <code>fast-mul</code>
   analogous to 
  <code>fast-expt</code>
   that uses a logarithmic number of steps.
  </p>

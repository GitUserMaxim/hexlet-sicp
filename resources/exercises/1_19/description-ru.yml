name: 'Числа Фибоначчи через преобразование'
description: |
  <p>Существует хитрый алгоритм получения чисел Фибоначчи за логарифмическое число шагов. Вспомните трансформацию переменных состояния 
  <code>a</code>
   и 
  <code>b</code>
   процесса 
  <code>fib-iter</code>
   из раздела 1.2.2: 
  <code>a ← a + b</code>
   и 
  <code>b ← a</code>
  . Назовем эту трансформацию 
  <code>T</code>
   и заметим, что n-кратное применение 
  <code>T</code>
  , начиная с 1 и 0, дает нам пару 
  <code>Fib(n + 1)</code>
   и 
  <code>Fib(n)</code>
  . Другими словами, числа Фибоначчи получаются путем применения 
  <code>Tⁿ</code>
  , n-ой степени трансформации 
  <code>T</code>
  , к паре 
  <code>(1,0)</code>
  . Теперь рассмотрим 
  <code>T</code>
   как частный случай 
  <code>p = 0</code>
  , 
  <code>q = 1</code>
   в семействе трансформаций 
  <code>Tpq</code>
  , где 
  <code>Tpq</code>
   преобразует пару 
  <code>(a,b)</code>
   по правилу 
  <code>a ← bq + aq + ap, b ← bp + aq</code>
  . Покажите, что двукратное применение трансформации 
  <code>Tpq</code>
   равносильно однократному применению трансформации 
  <code>Tp′q′</code>
   того же типа, и вычислите 
  <code>p′</code>
   и 
  <code>q′</code>
   через 
  <code>p</code>
   и 
  <code>q</code>
  . Это дает нам прямой способ возводить такие трансформации в квадрат, и таким образом, мы можем вычислить 
  <code>Tⁿ</code>
   с помощью последовательного возведения в квадрат, как в процедуре 
  <code>fast-expt</code>
  . Используя все эти идеи, завершите следующую процедуру, которая дает результат за логарифмическое число шагов:
  </p>
  <pre><code>(define (fib n)
    (fib-iter 1 0 0 1 n))
  (define (fib-iter a b p q count)
    (cond ((= count 0) b)
          ((even? count)
           (fib-iter a
                     b
                     &lt;??&gt;      ; compute p'
                     &lt;??&gt;      ; compute q'
                     (/ count 2)))
          (else (fib-iter (+ (* b q) (* a q) (* a p))
                          (+ (* b p) (* a q))
                          p
                          q
                          (- count 1)))))
  </code></pre>

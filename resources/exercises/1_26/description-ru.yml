name: 'Медленная процедура'
description: |
  <p>У Хьюго Дума большие трудности в упражнении <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('1.24')) }}">1.24</a>
  . Процедура 
  <code>fast-prime?</code>
   у него работает медленнее, чем 
  <code>prime?</code>
  . Хьюго просит помощи у своей знакомой Евы Лу Атор. Вместе изучая код Хьюго, они обнаруживают, что тот переписал процедуру 
  <code>expmod</code>
   с явным использованием умножения вместо того, чтобы вызывать 
  <code>square</code>
  :
  </p>
  <pre><code>(define (expmod base exp m)
    (cond ((= exp 0) 1)
          ((even? exp)
           (remainder (* (expmod base (/ exp 2) m)
                         (expmod base (/ exp 2) m))
                      m))
          (else
           (remainder (* base (expmod base (- exp 1) m))
                      m)))
  </code></pre>
  <p>Хьюго говорит: «Я не вижу здесь никакой разницы». «Зато я вижу, — отвечает Ева. — Переписав процедуру таким образом, ты превратил процесс порядка Θ(log n) в процесс порядка Θ(n)». Объясните.</p>

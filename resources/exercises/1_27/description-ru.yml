name: 'Числа Кармайкла'
description: |
  <p>Покажите, что числа Кармайкла (несколько первых это: 561, 1105, 1729, 2465, 2821 и 6601) действительно «обманывают» тест Ферма: напишите процедуру 
  <code>carmichael-test</code>
  , которая берет целое число 
  <code>n</code>
   и проверяет, правда ли 
  <code>a</code>
   в степени 
  <code>n</code>
   равняется 
  <code>a</code>
   по модулю 
  <code>n</code>
   для всех 
  <code>a < n</code>
  , и проверьте эту процедуру на этих числах Кармайкла.
  </p>

name: 'Тест Миллера–Рабина'
description: |
  <p>Один из вариантов теста Ферма, который невозможно обмануть, называется тест Миллера–Рабина (Miller-Rabin test) (Miller 1976; Rabin 1980). Он основан на альтернативной формулировке Малой теоремы Ферма, которая состоит в том, что если 
  <code>n</code>
   — простое число, а 
  <code>a</code>
   — произвольное положительное целое число, меньшее 
  <code>n</code>
  , то a в 
  <code>n − 1</code>
  ой степени равняется 1 по модулю 
  <code>n</code>
  . Проверяя простоту числа 
  <code>n</code>
   методом Миллера–Рабина, мы берем случайное число 
  <code>a < n</code>
   и возводим его в (
  <code>n − 1</code>
  )-ю степень по модулю 
  <code>n</code>
   с помощью процедуры 
  <code>expmod</code>
  . Однако когда в процедуре 
  <code>expmod</code>
   мы проводим возведение в квадрат, мы проверяем, не нашли ли мы «нетривиальный квадратный корень из 1 по модулю 
  <code>n</code>
  », то есть число, не равное 1 или 
  <code>n − 1</code>
  , квадрат которого по модулю 
  <code>n</code>
   равен 1. Можно доказать, что если такой нетривиальный квадратный корень из 1 существует, то 
  <code>n</code>
   не простое число. Можно, кроме того, доказать, что если 
  <code>n</code>
   — нечетное число, не являющееся простым, то по крайней мере для половины чисел 
  <code>a < n</code>
   вычисление 
  <code>a^(n − 1)</code>
   с помощью такой процедуры обнаружит нетривиальный квадратный корень из 1 по модулю 
  <code>n</code>
   (вот почему тест Миллера–Рабина невозможно обмануть). Модифицируйте процедуру 
  <code>expmod</code>
   так, чтобы она сигнализировала обнаружение нетривиального квадратного корня из 1, и используйте ее для реализации теста Миллера–Рабина с помощью процедуры 
  <code>miller-rabin-test</code>
  , аналогичной 
  <code>fermat-test</code>
  . Проверьте свою процедуру на нескольких известных Вам простых и составных числах. Подсказка: удобный способ заставить 
  <code>expmod</code>
   подавать особый сигнал — заставить ее возвращать 0.
  </p>

name: 'Правило Симпсона'
description: |
  <p>Правило Симпсона — более точный метод численного интегрирования, чем представленный выше. С помощью правила Симпсона интеграл функции 
  <code>f</code>
   между 
  <code>a</code>
   и 
  <code>b</code>
   приближенно вычисляется в виде
  </p>
  <img class="img-fluid" src="{{ asset("images/exercises/1_29.gif") }}" alt="1.29">
  <p>где 
  <code>h = (b − a)/n</code>
  , для какого - то четного целого числа 
  <code>n</code>
  , а 
  <code>yₖ = f(a + kh)</code>
  . (Увеличение 
  <code>n</code>
   повышает точность приближенного вычисления.) Определите процедуру 
  <code>simpson</code>
  , которая принимает в качестве аргументов 
  <code>f</code>
  , 
  <code>a</code>
  , 
  <code>b</code>
   и 
  <code>n</code>
  , и возвращает значение интеграла, вычисленное по правилу Симпсона. С помощью этой процедуры проинтегрируйте 
  <code>cube</code>
   между 0 и 1 (с 
  <code>n</code>
   = 100 и 
  <code>n</code>
   = 1000) и сравните результаты с процедурой 
  <code>integral</code>
  , приведенной выше.
  </p>

name: 'Обобщенное накопление'
description: |
  <p>Можно получить еще более общую версию 
  <code>accumulate</code>
   (упражнение 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('1.32')) }}">1.32</a>
  ), если ввести понятие фильтра (filter) на комбинируемые термы.То есть комбинировать только те термы, порожденные из значений диапазона, которые удовлетворяют указанному условию. Получающаяся абстракция 
  <code>filtered-accumulate</code>
   получает те же аргументы, что и 
  <code>accumulate</code>
  , плюс дополнительный одноаргументный предикат, который определяет фильтр. Запишите 
  <code>filtered-accumulate</code>
   ввиде процедуры. Покажите, как с помощью 
  <code>filtered-accumulate</code>
   выразить следующее:
  </p>
  <p>а. сумму квадратов простых чисел в интервале от 
  <code>a</code>
   до 
  <code>b</code>
   (в предположении, что процедура 
  <code>prime?</code>
   уже написана);
  </p>
  <p>б. произведение всех положительных целых чисел меньше 
  <code>n</code>
  , которые просты по отношению к 
  <code>n</code>
   (то есть всех таких положительных целых чисел 
  <code>i < n</code>
  , что НОД
  <code>(i, n) = 1</code>
  ).
  </p>

name: 'Вычислить комбинацию'
description: |
  <p>Допустим, мы определили процедуру</p>
  <pre><code>(define (f g)
    (g 2))
  </code></pre>
  <p>Тогда мы имеем</p>
  <pre><code>(f square)
  <i>4</i>

  (f (lambda (z) (* z (+ z 1))))
  <i>6</i>
  </code></pre>
  <p>Что случится, если мы (извращенно) попросим интерпретатор вычислить комбинацию 
  <code>(f f)</code>
  ? Объясните.
  </p>

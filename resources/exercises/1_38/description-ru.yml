name: 'Формула Эйлера'
description: |
  <p>В 1737 году швейцарский математик Леонард Эйлер опубликовал статью De functionibus Continuis, которая содержала расширение цепной дроби для 
  <code>e − 2</code>
  , где 
  <code>e</code>
   — основание натуральных логарифмов. В этой дроби все 
  <code>Ni</code>
   равны 
  <code>1</code>
  , а 
  <code>Di</code>
   последовательно равны 
  <code>1, 2, 1, 1, 4, 1, 1, 6, 1, 1, 8, ...</code>
   Напишите программу, использующую Вашу процедуру 
  <code>cont-frac</code>
   из упражнения 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('1.37')) }}">1.37</a>
   для вычисления 
  <code>e</code>
   на основании формулы Эйлера.
  </p>

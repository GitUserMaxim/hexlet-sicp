name: 'Формула Ламберта'
description: |
  <p>Представление тангенса в виде цепной дроби было опубликовано в 1770 году немецким математиком Й.Х. Ламбертом:</p>
  <pre><code>tan x  =        x
           ---------------
           1 -     x²
               -----------
               3 -   x²
                   -------
                   5 - ...
  </code></pre>
  <p>где 
  <code>x</code>
   дан в радианах. Определите процедуру 
  <code>(tan-cf x k)</code>
  , которая вычисляет приближение к тангенсу на основе формулы Ламберта. 
  <code>K</code>
   указывает количество термов, которые требуется вычислить, как в упражнении 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('1.37')) }}">1.37</a>
  .</p>

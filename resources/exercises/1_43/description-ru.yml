name: 'N-кратное применение f'
description: |
  <p>Если 
  <code>f</code>
   есть численная функция, а 
  <code>n</code>
   — положительное целое число, то мы можем построить 
  <code>n</code>
  -кратное применение 
  <code>f</code>
  , которое определяется как функция, значение которой в точке 
  <code>x</code>
   равно 
  <code>f(f(...(f(x))...))</code>
  . Например, если 
  <code>f</code>
   есть функция 
  <code>x → x + 1</code>
  , то 
  <code>n</code>
  -кратным применением 
  <code>f</code>
   будет функция 
  <code>x → x + n</code>
  . Если 
  <code>f</code>
   есть операция возведения в квадрат, то 
  <code>n</code>
  -кратное применение 
  <code>f</code>
   есть функция, которая возводит свой аргумент в 
  <code>2ⁿ</code>
  -ю степень. Напишите процедуру, которая принимает в качестве ввода процедуру, вычисляющую 
  <code>f</code>
  , и положительное целое 
  <code>n</code>
  , и возвращает процедуру, вычисляющую 
  <code>n</code>
  -кратное применение 
  <code>f</code>
  . Требуется, чтобы Вашу процедуру можно было использовать в таких контекстах:
  </p>
  <pre><code>((repeated square 2) 5)
  <i>625</i>
  </code></pre>
  <p>Подсказка: может оказаться удобно использовать 
  <code>compose</code>
   из упражнения 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('1.42')) }}">1.42</a>
  .</p>

name: 'N-кратно сглаженная функция'
description: |
  <p>Идея сглаживания (smoothing a function) играет важную роль в обработке сигналов. Если 
  <code>f</code>
   — функция, а 
  <code>dx</code>
   — некоторое малое число, то сглаженная версия 
  <code>f</code>
   есть функция, значение которой в точке 
  <code>x</code>
   есть среднее между 
  <code>f(x − dx)</code>
  , 
  <code>f(x)</code>
   и 
  <code>f(x + dx)</code>
  . Напишите процедуру 
  <code>smooth</code>
  , которая в качестве ввода принимает процедуру, вычисляющую 
  <code>f</code>
  , и возвращает процедуру, вычисляющую сглаженную версию 
  <code>f</code>
  . Иногда бывает удобно проводить повторное сглаживание (то есть сглаживать сглаженную функцию и т.д.), получая 
  <code>n</code>
  -кратно сглаженную функцию (n-fold smoothed function). Покажите, как породить 
  <code>n</code>
  -кратно сглаженную функцию с помощью 
  <code>smooth</code>
   и 
  <code>repeated</code>
   из упражнения 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('1.43')) }}">1.43</a>
  .</p>

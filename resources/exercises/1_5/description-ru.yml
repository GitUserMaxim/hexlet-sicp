name: 'Порядок вычислений'
description: |
  <p>Бен Битобор придумал тест для проверки интерпретатора на то, с каким порядком вычислений онработает, аппликативным или нормальным. Бен определяет такие две процедуры:</p>
  <pre><code>(define (p) (p))

  (define (test x y)
      (if (= x 0)
          0
          y))</code></pre>
  <p>Затем он вычисляет выражение</p>
  <pre><code>(test 0 (p))</code></pre>
  <p>Какое поведение увидит Бен, если интерпретатор использует аппликативный порядок вычислений? Какое поведение он увидит, если интерпретатор использует нормальный порядок? Объясните Ваш ответ. (Предполагается, что правило вычисления особой формы if одинаково независимо от того,какой порядок вычислений используется. Сначала вычисляется выражение-предикат, и результат определяет, нужно ли вычислять выражение-следствие или альтернативу.)</p>

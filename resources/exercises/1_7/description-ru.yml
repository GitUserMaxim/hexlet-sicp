name: 'Квадратный корень'
description: |
  <p>Проверка 
  <code>good-enough?</code>
  , которую мы использовали для вычисления квадратных корней, будет довольно неэффективна для поиска квадратных корней от очень маленьких чисел. Кроме того, в настоящих компьютерах арифметические операции почти всегда вычисляются с ограниченной точностью. Поэтому наш тест оказывается неадекватным и для очень больших чисел. Альтернативный подход к реализации 
  <code>good-enough?</code>
   состоит в том, чтобы следить, как от одной итерации к другой изменяется 
  <code>guess</code>
  , и остановиться, когда изменение оказывается небольшой долей значения приближения. Разработайте процедуру вычисления квадратного корня 
  <code>square-root</code>
  , которая использует такой вариант проверки на завершение. Верно ли, что на больших и маленьких числах она работает лучше?</p>

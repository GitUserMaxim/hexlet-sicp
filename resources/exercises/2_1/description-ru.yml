name: 'Модификация make-rat'
description: |
  <p>Определите улучшенную версию 
  <code>make-rat</code>
  , которая принимала бы как положительные, так и отрицательные аргументы. 
  <code>Make-rat</code>
   должна нормализовывать знак так, чтобы в случае, если рациональное число положительно, то и его числитель, и знаменатель были бы положительны, а если оно отрицательно, то чтобы только его числитель был отрицателен.
  </p>

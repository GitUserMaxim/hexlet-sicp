name: 'Знаки конечных точек интервалов'
description: |
  <p>Проходя мимо, Бен делает туманное замечание: «Если проверять знаки концов интервалов, можно разбить 
  <code>mul-interval</code>
   на девять случаев, из которых только в одном требуется более двух умножений». Перепишите эту процедуру в соответствии с предложением Бена.
  </p>

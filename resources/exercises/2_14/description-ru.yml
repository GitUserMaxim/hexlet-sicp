name: 'Различные результаты по формулам для параллельных резисторов'
description: |
  <p>Покажите, что Дайко прав. Исследуйте поведение системы на различных арифметических выражениях. Создайте несколько интервалов 
  <code>A</code>
   и 
  <code>B</code>
   и вычислите с их помощью выражения 
  <code>A/A</code>
   и 
  <code>A/B</code>
  . Наибольшую пользу Вы получите, если будете использовать интервалы, радиус которых составляет малую часть от среднего значения. Исследуйте результаты вычислений в форме центр/проценты (см. упражнение 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.12')) }}">2.12</a>
  ).</p>

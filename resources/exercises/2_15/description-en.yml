name: 'A form of formula that no variable that represents an uncertain number is repeated'
description: |
  <p>Eva Lu Ator, another user, has also noticed the different intervals computed by different but algebraically equivalent expressions. She says that a formula to compute with intervals using Alyssa's system will produce tighter error bounds if it can be written in such a form that no variable that represents an uncertain number is repeated. Thus, she says, 
  <code>par2</code>
   is a ``better`` program for parallel resistances than 
  <code>par1</code>
  . Is she right? Why?
  </p>

name: 'Размен монет разных валют'
description: |
  <p>Рассмотрим программу подсчета способов размена из раздела 1.2.2. Было бы приятно иметь возможность легко изменять валюту, которую эта программа использует, так, чтобы можно было, например, вычислить, сколькими способами можно разменять британский фунт. Эта программа написана так, что знание о валюте распределено между процедурами 
  <code>first-denomination</code>
   и 
  <code>count-change</code>
   (которая знает, что существует пять видов американских монет). Приятнее было бы иметь возможность просто задавать список монет, которые можно использовать при размене. 
  </p>
  <p>Мы хотим переписать процедуру 
  <code>cc</code>
   так, чтобы ее вторым аргументом был список монет, а не целое число, которое указывает, какие монеты использовать. Тогда у нас могли бы быть списки, определяющие типы валют:
  </p>
  <pre><code>(define us-coins (list 50 25 10 5 1))

  (define uk-coins (list 100 50 20 10 5 2 1 0.5))
  </code></pre>
  <p>Можно было бы вызывать 
  <code>cc</code>
   следующим образом:
  </p>
  <pre><code>(cc 100 us-coins)
  <i>292</i>
  </code></pre>
  <p>Это потребует некоторых изменений в программе 
  <code>cc</code>
  . Ее форма останется прежней, но со вторым аргументом она будет работать иначе, вот так:
  </p>
  <pre><code>(define (cc amount coin-values)
    (cond ((= amount 0) 1)
          ((or (< amount 0) (no-more? coin-values)) 0)
          (else
           (+ (cc amount
                  (except-first-denomination coin-values))
              (cc (- amount
                     (first-denomination coin-values))
                  coin-values)))))
  </code></pre>
  <p>Определите процедуры 
  <code>first-denomination</code>
  , 
  <code>except-first-denomination</code>
   и 
  <code>no-more?</code>
   в терминах элементарных операций над списковыми структурами. Влияет ли порядок списка 
  <code>coin-values</code>
   на результат, получаемый 
  <code>cc</code>
  ? Почему?
  </p>

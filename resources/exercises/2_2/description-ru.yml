name: 'Представление отрезков на плоскости'
description: |
  <p>Рассмотрим задачу представления отрезков прямой на плоскости. Каждый отрезок представляется как пара точек: начало и конец. Определите конструктор 
  <code>make-segment</code>
   и селекторы 
  <code>start-segment</code>
   и 
  <code>end-segment</code>
  , которые определяют представление отрезков в терминах точек. Далее, точку можно представить как пару чисел: координата 
  <code>x</code>
   и координата 
  <code>y</code>
  . Соответственно, напишите конструктор 
  <code>make-point</code>
   и селекторы 
  <code>x-point</code>
   и 
  <code>y-point</code>
  , которые определяют такое представление. Наконец, используя свои селекторы и конструктор, напишите процедуру 
  <code>midpoint-segment</code>
  , которая принимает отрезок в качестве аргумента и возвращает его середину (точку, координаты которой являются средним координат концов отрезка). Чтобы опробовать эти процедуры, Вам потребуется способ печатать координаты точек:
  </p>
  <pre><code>(define (print-point p)
    (newline)
    (display "(")
    (display (x-point p))
    (display ",")
    (display (y-point p))
    (display ")"))
  </code></pre>

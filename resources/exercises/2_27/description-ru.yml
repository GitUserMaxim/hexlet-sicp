name: 'Глубокий переворот списка'
description: |
  <p>Измените свою процедуру 
  <code>reverse</code>
   из упражнения 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.18')) }}">2.18</a>
   так, чтобы получилась процедура 
  <code>deep-reverse</code>
  , которая принимает список в качестве аргумента и возвращает в качестве значения список, где порядок элементов обратный и подсписки также обращены. Например:
  </p>
  <pre><code>(define x (list (list 1 2) (list 3 4)))

  x
  <i>((1 2) (3 4))</i>

  (reverse x)
  <i>((3 4) (1 2))</i>

  (deep-reverse x)
  <i>((4 3) (2 1))</i>
  </code></pre>

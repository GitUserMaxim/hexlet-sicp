name: 'Бинарный мобиль'
description: |
  <p>Бинарный мобиль состоит из двух ветвей, левой и правой. Каждая ветвь представляет собой стержень определенной длины, с которого свисает либо гирька, либо еще один бинарный мобиль. Мы можем представить бинарный мобиль в виде составных данных, соединив две ветви (например, с помощью 
  <code>list</code>
  ):
  </p>
  <pre><code>(define (make-mobile left right)
    (list left right))
  </code></pre>
  <p>Ветвь составляется из длины 
  <code>length</code>
   (которая должна быть числом) и структуры 
  <code>structure</code>
  , которая может быть либо числом (представляющим простую гирьку), либо еще одним мобилем:
  </p>
  <pre><code>(define (make-branch length structure)
    (list length structure))
  </code></pre>
  <p>а. Напишите соответствующие селекторы 
  <code>left-branch</code>
   и 
  <code>right-branch</code>
  , которые возвращают левую и правую ветви мобиля, а также 
  <code>branch-length</code>
   и 
  <code>branch-structure</code>
  , которые возвращают компоненты ветви.
  </p>
  <p>б. С помощью этих селекторов напишите процедуру 
  <code>total-weight</code>
  , которая возвращает общий вес мобиля.
  </p>
  <p>в. Говорят, что мобиль сбалансирован, если момент вращения, действующий на его левую ветвь, равен моменту вращения, действующему на правую ветвь (то есть длина левого стержня, умноженная на вес груза, свисающего с него, равна соответствующему произведению для правой стороны), и если все подмобили, свисающие с его ветвей, также сбалансированы.  Напишите предикат, который проверяет мобили на сбалансированность.</p>
  <p>г. Допустим, мы изменили представление мобилей, так что конструкторы теперь приняли такой вид:</p>
  <pre><code>(define (make-mobile left right)
    (cons left right))
  (define (make-branch length structure)
    (cons length structure))
  </code></pre>
  <p>Как много Вам нужно изменить в программах, чтобы перейти на новое представление?</p>

name: 'Представление прямоугольников на плоскости'
description: |
  <p>Реализуйте представление прямоугольников на плоскости. (Подсказка: Вам могут потребоваться результаты упражнения <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.2')) }}">2.2</a>
  ). Определите в терминах своих конструкторов и селекторов процедуры, которые вычисляют периметр и площадь прямоугольника. Теперь реализуйте другое представление для прямоугольников. Можете ли Вы спроектировать свою систему с подходящими барьерами абстракции так, чтобы одни и те же процедуры вычисления периметра и площади работали с любым из Ваших представлений?</p>

name: 'The set of all subsets'
description: |
  <p>We can represent a set as a list of distinct elements, and we can represent the set of all subsets of the set as a list of lists. For example, if the set is 
  <code>(1 2 3)</code>
  , then the set of all subsets is 
  <code>(() (3) (2) (2 3) (1) (1 3) (1 2) (1 2 3))</code>
  . Complete the following definition of a procedure that generates the set of subsets of a set and give a clear explanation of why it works:
  </p>
  <pre><code>(define (subsets s)
    (if (null? s)
        (list nil)
        (let ((rest (subsets (cdr s))))
          (append rest (map &lt;??&gt; rest)))))
  </code></pre>

name: 'Списковые операции в виде накопления'
description: |
  <p>Заполните пропущенные выражения, так, чтобы получились определения некоторых базовых операций по работе со списками в виде накопления:</p>
  <pre><code>(define (map p sequence)
    (accumulate (lambda (x y) &lt;??&gt;) nil sequence))

  (define (append seq1 seq2)
    (accumulate cons &lt;??&gt; &lt;??&gt;))

  (define (length sequence)
    (accumulate &lt;??&gt; 0 sequence))
  </code></pre>

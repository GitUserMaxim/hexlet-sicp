name: "Horner's rule"
description: |
  <p>Evaluating a polynomial in 
  <code>x</code>
   at a given value of 
  <code>x</code>
   can be formulated as an accumulation. We evaluate the polynomial
  </p>
  <img class="img-fluid" src="{{ asset("images/exercises/2_34_1.gif") }}" alt="2.34.1">
  <p>using a well-known algorithm called Horner's rule, which structures the computation as</p>
  <img class="img-fluid" src="{{ asset("images/exercises/2_34_2.gif") }}" alt="2.34.2">
  <p>In other words, we start with 
  <code>aₙ</code>
  , multiply by 
  <code>x</code>
   and so on, until we reach 
  <code>a₀</code>
  . Fill in the following template to produce a procedure that evaluates a polynomial using Horner's rule. Assume that the coefficients of the polynomial are arranged in a sequence, from 
  <code>a₀</code>
   through 
  <code>aₙ</code>
  .
  </p>
  <pre><code>(define (horner-eval x coefficient-sequence)
    (accumulate (lambda (this-coeff higher-terms) &lt;??&gt;)
                0
                coefficient-sequence))
  </code></pre>
  <p>For example, to compute 
  <code>1 + 3x + 5x³ + x⁵</code>
   at 
  <code>x = 2</code>
   you would evaluate
  </p>
  <pre><code>(horner-eval 2 (list 1 3 0 5 0 1))
  </code></pre>

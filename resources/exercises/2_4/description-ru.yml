name: 'Процедурное представление пар'
description: |
  <p>Вот еще одно процедурное представление для пар. Проверьте для этого представления, что 
  <code>(car (cons x y))</code>
   возвращает 
  <code>x</code>
   при любых двух объектах 
  <code>x</code>
   и 
  <code>y</code>
  .
  </p>
  <pre><code>(define (cons x y)
    (lambda (m) (m x y)))

  (define (car z)
    (z (lambda (p q) p)))
  </code></pre>
  <p>Каково соответствующее определение 
  <code>cdr</code>
  ? (Подсказка: Чтобы проверить, что это работает, используйте подстановочную модель из раздела 1.1.5.)
  </p>

name: 'Задача о восьми ферзях'
description: |
  <img class="img-fluid" src="{{ asset("images/exercises/2_42.gif") }}" alt="2.42">
  <p>Рис. 2.8. Решение задачи о восьми ферзях.</p>
  <p>В «задаче о восьми ферзях» спрашивается, как расставить на шахматной доске восемь ферзей так, чтобы ни один из них не бил другого (то есть никакие два ферзя не должны находиться на одной вертикали, горизонтали или диагонали). Одно из возможных решений показано на рисунке 2.8. Один из способов решать эту задачу состоит в том, чтобы идти поперек доски, устанавливая по ферзю в каждой вертикали. После того, как 
  <code>k − 1</code>
   ферзя мы уже разместили, нужно разместить 
  <code>k</code>
  -го в таком месте, где он не бьет ни одного из тех, которые уже находятся на доске. Этот подход можно сформулировать рекурсивно: предположим, что мы уже породили последовательность из всех возможных способов разместить 
  <code>k − 1</code>
   ферзей на первых 
  <code>k − 1</code>
   вертикалях доски. Для каждого из этих способов мы порождаем расширенный набор позиций, добавляя ферзя на каждую горизонталь 
  <code>k</code>
  -й вертикали. Затем эти позиции нужно отфильтровать, оставляя только те, где ферзь на 
  <code>k</code>
  -й вертикали не бьется ни одним из остальных. Продолжая этот процесс, мы породим не просто одно решение, а все решения этой задачи.
  </p>
  <p>Это решение мы реализуем в процедуре 
  <code>queens</code>
  , которая возвращает последовательность решений задачи размещения 
  <code>n</code>
   ферзей на доске 
  <code>n × n</code>
  . В процедуре 
  <code>queens</code>
   есть внутренняя процедура 
  <code>queen-cols</code>
  , которая возвращает последовательность всех способов разместить ферзей на первых 
  <code>k</code>
   вертикалях доски.
  </p>
  <pre><code>(define (queens board-size)
    (define (queen-cols k)
      (if (= k 0)
          (list empty-board)
          (filter
           (lambda (positions) (safe? k positions))
           (flatmap
            (lambda (rest-of-queens)
              (map (lambda (new-row)
                     (adjoin-position new-row k rest-of-queens))
                   (enumerate-interval 1 board-size)))
            (queen-cols (- k 1))))))
    (queen-cols board-size))
  </code></pre>
  <p>В этой процедуре 
  <code>rest-of-queens</code>
   есть способ размещения 
  <code>k − 1</code>
   ферзя на первых 
  <code>k − 1</code>
   вертикалях, а 
  <code>new-row</code>
   — это горизонталь, на которую предлагается поместить ферзя с 
  <code>k</code>
  -й вертикали. Завершите эту программу, реализовав представление множеств позиций ферзей на доске, включая процедуру 
  <code>adjoin-position</code>
  , которая добавляет нового ферзя на определенных горизонтали и вертикали к заданному множеству позиций, и 
  <code>empty-board</code>
  , которая представляет пустое множество позиций. Еще нужно написать процедуру 
  <code>safe?</code>
  , которая для множества позиций определяет, находится ли ферзь с 
  <code>k</code>
  -й вертикали в безопасности от остальных. (Заметим, что нам требуется проверять только то, находится ли в безопасности новый ферзь — для остальных ферзей безопасность друг от друга уже гарантирована.)
  </p>

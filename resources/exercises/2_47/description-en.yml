name: 'Frames implementation'
description: |
  <p>Here are two possible constructors for frames:</p>
  <pre><code>(define (make-frame-list origin edge1 edge2)
    (list origin edge1 edge2))

  (define (make-frame-cons origin edge1 edge2)
    (cons origin (cons edge1 edge2)))
  </code></pre>
  <p>For each constructor supply the appropriate selectors to produce an implementation for frames.</p>

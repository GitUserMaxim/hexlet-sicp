name: 'Представление отрезков с помощью векторов.'
description: |
  <p>Направленный отрезок на плоскости можно представить в виде пары векторов: вектор от начала координат до начала отрезка и вектор от начала координат до конца отрезка. Используйте свое представление векторов из упражнения <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.46')) }}">2.46</a>
   и определите представление отрезков с конструктором 
  <code>make-segment</code>
   и селекторами 
  <code>start-segment</code>
   и 
  <code>end-segment</code>
  .
  </p>

name: 'Обращение и поворот изображений'
description: |
  <p>Определите преобразование 
  <code>flip-horiz</code>
  , которое обращает изображение вокруг горизонтальной оси, а также преобразования, которые вращают рисовалки против часовой стрелки на 
  <code>180</code>
   и 
  <code>270</code>
   градусов.
  </p>

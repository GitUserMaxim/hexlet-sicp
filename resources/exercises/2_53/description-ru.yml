name: 'Вычисление выражений'
description: |
  <p>Что напечатает интерпретатор в ответ на каждое из следующих выражений?</p>
  <pre><code>(list 'a 'b 'c)

  (list (list 'george))

  (cdr '((x1 x2) (y1 y2)))

  (cadr '((x1 x2) (y1 y2)))

  (pair? (car '(a short list)))

  (memq 'red '((red shoes) (blue socks)))

  (memq 'red '(red shoes blue socks))
  </code></pre>

name: 'Дифференцирование нескольких термов'
description: |
  <p>Расширьте программу дифференцирования так, чтобы она работала с суммами и произведениями любого (больше двух) количества термов. Тогда последний из приведенных выше примеров мог бы быть записан как</p>
  <pre><code>(deriv '(* x y (+ x 3)) 'x)
  </code></pre>
  <p>Попытайтесь сделать это, изменяя только представление сумм и произведений, не трогая процедуру 
  <code>deriv</code>
  . Тогда, например, процедура 
  <code>addend</code>
   будет возвращать первое слагаемое суммы, а 
  <code>augend</code>
   сумму остальных.
  </p>

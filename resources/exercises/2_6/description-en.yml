name: 'Church numerals'
description: |
  <p>In case representing pairs as procedures wasn't mind-boggling enough, consider that, in a language that can manipulate procedures, we can get by without numbers (at least insofar as nonnegative integers are concerned) by implementing 
  <code>0</code>
   and the operation of adding 
  <code>1</code>
   as
  </p>
  <pre><code>(define zero (lambda (f) (lambda (x) x)))

  (define (add-1 n)
    (lambda (f) (lambda (x) (f ((n f) x)))))
  </code></pre>
  <p>This representation is known as Church numerals, after its inventor, Alonzo Church, the logician who invented the λ calculus.</p>
  <p>Define 
  <code>one</code>
   and 
  <code>two</code>
   directly (not in terms of 
  <code>zero</code>
   and 
  <code>add-1</code>
  ). (Hint: Use substitution to evaluate 
  <code>(add-1 zero)</code>
  ). Give a direct definition of the addition procedure + (
  <code>add</code>
  ) (not in terms of repeated application of 
  <code>add-1</code>
  ).
  </p>

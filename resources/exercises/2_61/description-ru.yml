name: 'Добавление элемента в множество представленное упорядоченным списком'
description: |
  <p>Напишите реализацию 
  <code>adjoin-set</code>
   для упорядоченного представления. По аналогии с 
  <code>element-of-set?</code>
   покажите, как использовать упорядочение, чтобы получить процедуру, которая в среднем требует только половину числа шагов, которое требуется при неупорядоченном представлении.
  </p>

name: 'Partial-tree procedure'
description: |
  <p>The following procedure 
  <code>list->tree</code>
   converts an ordered list to a balanced binary tree. The helper procedure 
  <code>partial-tree</code>
   takes as arguments an integer 
  <code>n</code>
   and list of at least 
  <code>n</code>
   elements and constructs a balanced tree containing the first 
  <code>n</code>
   elements of the list. The result returned by 
  <code>partial-tree</code>
   is a pair (formed with 
  <code>cons</code>
  ) whose 
  <code>car</code>
   is the constructed tree and whose 
  <code>cdr</code>
   is the list of elements not included in the tree.
  </p>
  <pre><code>(define (list->tree elements)
    (car (partial-tree elements (length elements))))

  (define (partial-tree elts n)
    (if (= n 0)
        (cons '() elts)
        (let ((left-size (quotient (- n 1) 2)))
          (let ((left-result (partial-tree elts left-size)))
            (let ((left-tree (car left-result))
                  (non-left-elts (cdr left-result))
                  (right-size (- n (+ left-size 1))))
              (let ((this-entry (car non-left-elts))
                    (right-result (partial-tree (cdr non-left-elts)
                                                right-size)))
                (let ((right-tree (car right-result))
                      (remaining-elts (cdr right-result)))
                  (cons (make-tree this-entry left-tree right-tree)
                        remaining-elts))))))))
  </code></pre>
  <p>a. Write a short paragraph explaining as clearly as you can how 
  <code>partial-tree</code>
   works. Draw the tree produced by 
  <code>list->tree</code>
   for the list 
  <code>(1 3 5 7 9 11)</code>
  </p>
  <p>b. What is the order of growth in the number of steps required by 
  <code>list->tree</code>
   to convert a list of 
  <code>n</code>
   elements?
  </p>

name: 'Encode the message'
description: |
  <p>The following eight-symbol alphabet with associated relative frequencies was designed to efficiently encode the lyrics of 1950s rock songs. (Note that the ''symbols'' of an ''alphabet'' need not be individual letters.)</p>
  <pre><code>A       2   NA  16
  BOOM    1   SHA 3
  GET     2   YIP 9
  JOB     2   WAH 1
  </code></pre>
  <p>Use 
  <code>generate-huffman-tree</code>
   (exercise 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.69')) }}">2.69</a>
  ) to generate a corresponding Huffman tree, and use 
  <code>encode</code>
   (exercise 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.68')) }}">2.68</a>
  ) to encode the following message:</p>
  <pre><code>Get a job

  Sha na na na na na na na na

  Get a job

  Sha na na na na na na na na

  Wah yip yip yip yip yip yip yip yip yip

  Sha boom
  </code></pre>
  <p>How many bits are required for the encoding? What is the smallest number of bits that would be needed to encode this song if we used a fixed-length code for the eight-symbol alphabet?</p>

name: 'Кодирование сообщения'
description: |
  <p>Нижеприведенный алфавит из восьми символов с соответствующими им относительными частотами был разработан, чтобы эффективно кодировать слова рок-песен 1950-х годов. (Обратите внимание, что «символы» «алфавита» не обязаны быть отдельными буквами.)</p>
  <pre><code>A       2   NA  16
  BOOM    1   SHA 3
  GET     2   YIP 9
  JOB     2   WAH 1
  </code></pre>
  <p>При помощи 
  <code>generate-huffman-tree</code>
   (упр. 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.69')) }}">2.69</a>
  ) породите соответствующее дерево Хаффмана, и с помощью 
  <code>encode</code>
   (упр. 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.68')) }}">2.68</a>
  ) закодируйте следующее сообщение:</p>
  <pre><code>Get a job

  Sha na na na na na na na na

  Get a job

  Sha na na na na na na na na

  Wah yip yip yip yip yip yip yip yip yip

  Sha boom
  </code></pre>
  <p>Сколько битов потребовалось для кодирования? Каково наименьшее число битов, которое потребовалось бы для кодирования этой песни, если использовать код с фиксированной длиной для алфавита из восьми символов?</p>

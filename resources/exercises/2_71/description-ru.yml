name: 'Частоты символов'
description: |
  <p>Допустим, у нас есть дерево Хаффмана для алфавита из 
  <code>n</code>
   символов, и относительные частоты символов равны 
  <code>1, 2, 4, ..., 2ⁿ⁻¹</code>
  . Изобразите дерево для 
  <code>n = 5</code>
  ; для 
  <code>n = 10</code>
  . Сколько битов в таком дереве (для произвольного 
  <code>n</code>
  ) требуется, чтобы закодировать самый частый символ? Самый редкий символ?
  </p>

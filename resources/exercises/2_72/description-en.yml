name: 'Growth order for character encoding'
description: |
  <p>Consider the encoding procedure that you designed in exercise <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.68')) }}">2.68</a>
  . What is the order of growth in the number of steps needed to encode a symbol? Be sure to include the number of steps needed to search the symbol list at each node encountered. To answer this question in general is difficult. Consider the special case where the relative frequencies of the n symbols are as described in exercise <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.71')) }}">2.71</a>
  , and give the order of growth (as a function of 
  <code>n</code>
  ) of the number of steps needed to encode the most frequent and least frequent symbols in the alphabet.
  </p>

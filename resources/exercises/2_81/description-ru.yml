name: 'Привидение совпадающих типов аргументов'
description: |
  <p>Хьюго Дум заметил, что 
  <code>apply-generic</code>
   может пытаться привести аргументы к типу друг друга даже тогда, когда их типы и так совпадают. Следовательно, решает он, нам нужно вставить в таблицу приведения процедуры, которые «приводят» аргументы каждого типа к нему самому. Например, в дополнение к приведению 
  <code>scheme-number->complex</code>
  , описанному выше, он бы написал еще:
  </p>
  <pre><code>(define (scheme-number->scheme-number n) n)
  (define (complex->complex z) z)
  (put-coercion 'scheme-number 'scheme-number
                scheme-number->scheme-number)
  (put-coercion 'complex 'complex complex->complex)
  </code></pre>
  <p>а. Если установлены процедуры приведения типов, написанные Хьюго, что произойдет, когда 
  <code>apply-generic</code>
   будет вызвана с двумя аргументами типа 
  <code>scheme-number</code>
   или двумя аргументами типа 
  <code>complex</code>
   для операции, которая не находится в таблице для этих типов? Допустим, например, что мы определили обобщенную процедуру возведения в степень:
  </p>
  <pre><code>(define (exp x y) (apply-generic 'exp x y))
  </code></pre>
  <p>и добавили процедуру возведения в степень в пакет 
  <code>scheme-number</code>
   и ни в какой другой:
  </p>
  <p>;; Следующие строки добавляются в пакет 
  <code>scheme-number</code>
   
  </p>
  <pre><code>(put 'exp '(scheme-number scheme-number)
       (lambda (x y) (tag (expt x y)))) ; using primitive expt
  </code></pre>
  <p>Что произойдет, если мы позовем 
  <code>exp</code>
   с двумя комплексными числами в качестве аргументов?
  </p>
  <p>б. Прав ли Хьюго, что нужно что-то сделать с приведением однотипных аргументов, или все и так работает правильно?</p>
  <p>в. Измените 
  <code>apply-generic</code>
   так, чтобы она не пыталась применить приведение, если у обоих аргументов один и тот же тип.
  </p>

name: 'Обобщение комплексных чисел'
description: |
  <p>Допустим, нам хочется работать с комплексными числами, чьи действительные и мнимые части, модули и аргументы могут быть обыкновенными числами, рациональными числами либо любыми другими, какие нам захочется добавить к системе. Опишите и реализуйте изменения в системе, которые потребуются, чтобы добавить такую возможность. Вам придется определить операции вроде 
  <code>sine</code>
   (синус) и 
  <code>cosine</code>
   (косинус), обобщенные на обыкновенные и рациональные числа.
  </p>

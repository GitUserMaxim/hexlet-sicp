name: 'Деление многочленов с одной переменной'
description: |
  <p>Многочлены с одной переменной можно делить друг на друга, получая частное и остаток. Например,</p>
  <img class="img-fluid" src="{{ asset("images/exercises/2_91.gif") }}" alt="2.91">
  <p>Деление можно производить в столбик. А именно, разделим старший член делимого на старший член делителя. В результате получится первый терм частного. Затем умножим результат на делитель, вычтем получившийся многочлен из делимого и, рекурсивно деля разность на делитель, получим оставшуюся часть частного. Останавливаемся, когда порядок делителя превысит порядок делимого, и объявляем остатком то, что тогда будет называться делимым. Кроме того, если когда-нибудь делимое окажется нулем, возвращаем ноль в качестве и частного, и остатка.</p>
  <p>Процедуру 
  <code>div-poly</code>
   можно разработать, следуя образцу 
  <code>add-poly</code>
   и 
  <code>mul-poly</code>
  . Процедура проверяет, одна ли и та же у многочленов переменная. Если это так, 
  <code>div-poly</code>
   откусывает переменную и передает задачу в 
  <code>div-terms</code>
  , которая производит операцию деления над списками термов. Наконец, 
  <code>div-poly</code>
   прикрепляет переменную к результату, который выдает 
  <code>div-terms</code>
  . Удобно сделать так, чтобы 
  <code>div-terms</code>
   выдавала и частное, и остаток при делении. Она может брать в качестве аргументов два терма и выдавать список, состоящий из списка термов частного и списка термов остатка. 
  </p>
  <p>Закончите следующее определение 
  <code>div-terms</code>
  , вставив недостающие выражения. Используйте ее, чтобы реализовать 
  <code>div-poly</code>
  , которая получает в виде аргументов два экземпляра 
  <code>poly</code>
  , а выдает список из 
  <code>poly</code>
  –частного и 
  <code>poly</code>
  –остатка.
  </p>
  <pre><code>(define (div-terms L1 L2)
    (if (empty-termlist? L1)
        (list (the-empty-termlist) (the-empty-termlist))
        (let ((t1 (first-term L1))
              (t2 (first-term L2)))
          (if (> (order t2) (order t1))
              (list (the-empty-termlist) L1)
              (let ((new-c (div (coeff t1) (coeff t2)))
                    (new-o (- (order t1) (order t2))))
                (let ((rest-of-result
                       &lt;compute rest of result recursively&gt;
                       ))
                  &lt;form complete result&gt;
                  ))))))
  </code></pre>

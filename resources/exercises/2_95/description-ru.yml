name: Псевдоделение
description: |
  <p>Пусть 
  <code>P₁</code>
  , 
  <code>P₂</code>
   и 
  <code>P₃</code>
   – многочлены
  </p>
  <pre><code>P<sub>1</sub>: x<sup>2</sup> − 2x + 1
  P<sub>2</sub>: 11x<sup>2</sup> + 1
  P<sub>3</sub>: 13x + 5
  </code></pre>
  <p>Теперь пусть 
  <code>Q1</code>
   будет произведение 
  <code>P₁</code>
   и 
  <code>P₂</code>
  , а 
  <code>Q₂</code>
   произведение 
  <code>P₁</code>
   и 
  <code>P₃</code>
  . При помощи 
  <code>greatest-common-divisor</code>
   (упражнение 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.94')) }}">2.94</a>
  ) вычислите НОД 
  <code>Q₁</code>
   и 
  <code>Q₂</code>
  . Обратите внимание, что ответ несовпадает с 
  <code>P₁</code>
  . Этот пример вводит в вычисление операции с нецелыми числами, и это создает сложности для алгоритма вычисления НОД. Чтобы понять, что здесь происходит, попробуйте включить трассировку в 
  <code>gcd-terms</code>
   при вычислении НОД либо проведите деление вручную.
  </p>
  <p>Проблему, которую демонстрирует упражнение 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.95')) }}">2.95</a>
  , можно решить, если мы используем следующий вариант алгоритма вычисления НОД (который работает только для многочленов с целыми коэффициентами). Прежде, чем проводить деление многочленов при вычислении НОД, мы умножаем делимое на целую константу, которая выбирается так, чтобы в процессе деления не возникло никаких дробей. Результат вычисления будет отличаться от настоящего НОД на целую константу, но при приведении рациональных функций к наименьшему знаменателю это несущественно; будет проведено деление и числителя, и знаменателя на НОД, так что константный множитель сократится.</p>
  <p>Выражаясь более точно, если 
  <code>P</code>
   и 
  <code>Q</code>
   — многочлены, определим 
  <code>O₁</code>
   как порядок 
  <code>P</code>
   (то есть порядок его старшего терма), а 
  <code>O₂</code>
   как порядок 
  <code>Q</code>
  . Пусть 
  <code>c</code>
   будет коэффициент старшего терма 
  <code>Q</code>
  . В таком случае, можно показать, что если мы домножим 
  <code>P</code>
   на множитель целости (integerizing factor) 
  <code>c^(1 + O₁ − O₂)</code>
  , то получившийся многочлен можно будет поделить на 
  <code>Q</code>
   алгоритмом 
  <code>div-terms</code>
  , получив результат, в котором не будет никаких дробей. Операция домножения делимого на такую константу, а затем деления, иногда называется псевдоделением (pseudodivision) 
  <code>P</code>
   на 
  <code>Q</code>
  . Остаток такого деления называется псевдоостатком (pseudoremainder).
  </p>

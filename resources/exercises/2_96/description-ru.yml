name: 'Множитель целости'
description: |
  <p>а. Напишите процедуру 
  <code>pseudoremainder-terms</code>
  , которая работает в точности как 
  <code>remainder-terms</code>
  , но только прежде, чем позвать 
  <code>div-terms</code>
  , домножает делимое на множитель целости, описанный выше. Модифицируйте 
  <code>gcd-terms</code>
   так, чтобы она использовала 
  <code>pseudoremainder-terms</code>
  , и убедитесь, что теперь 
  <code>greatest-common-divisor</code>
   выдает ответ с целыми коэффициентами в примере из упражнения 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.95')) }}">2.95</a></p>
  <p>б. Теперь у НОД целые коэффициенты, но они больше, чем коэффициенты 
  <code>P1</code>
  . Измените 
  <code>gcd-terms</code>
  , чтобы она убирала общий множитель из коэффициентов ответа путем деления всех коэффициентов на их (целочисленный) НОД.
  </p>
  <p>Итак, вот как привести рациональную функцию к наименьшему знаменателю:</p>
  <ul>
      <li>Вычислите НОД числителя и знаменателя, используя версию 
          <code>gcd-terms</code>
           из упражнения 
          <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.96')) }}">2.96</a>
      </li>
      <li>Когда Вы получаете НОД, домножьте числитель и знаменатель на множитель целости, прежде чем делить на НОД, чтобы при делении не получить дробных коэффициентов. В качестве множителя можно использовать старший коэффициент НОД, возведенный в степень 
          <code>1 + O1 − O2</code>
          , где 
          <code>O2</code>
           – порядок НОД, а 
          <code>O1</code>
           — максимум из порядков числителя и знаменателя. Так Вы добьетесь того, чтобы деление числителя и знаменателя на НОД не привносило дробей.
      </li>
      <li>В результате этой операции Вы получите числитель и знаменатель с целыми коэффициентами. Обычно из-за всех множителей целости коэффициенты окажутся очень большими, стало быть, на последнем шаге следует избавиться от лишних множителей, вычислив (целый) наибольший общий делитель числителя и знаменателя и поделив на него все термы.</li>
  </ul>

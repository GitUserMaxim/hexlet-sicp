name: 'Алгоритм как процедура'
description: |
  <p>а. Реализуйте этот алгоритм как процедуру 
  <code>reduce-terms</code>
  , которая принимает в качестве аргументов два списка термов 
  <code>n</code>
   и 
  <code>d</code>
   и возвращает список из 
  <code>nn</code>
   и 
  <code>dd</code>
  , которые представляют собой 
  <code>n</code>
   и 
  <code>d</code>
  , приведенные к наименьшему знаменателю по вышеописанному алгоритму. Напишите, кроме того, процедуру 
  <code>reduce-poly</code>
  , подобную 
  <code>add-poly</code>
  , которая проверяет, чтобы два 
  <code>poly</code>
   имели одну и ту же переменную. Если это так, 
  <code>reduce-poly</code>
   откусывает эту переменную и передает оставшуюся часть задачи в 
  <code>reduce-terms</code>
  , а затем прикрепляет переменную обратно к двум спискам термов, которые получены из 
  <code>reduce-terms</code>
  .
  </p>
  <p>б. Определите процедуру, аналогичную 
  <code>reduce-terms</code>
  , которая делает то, что делала для целых чисел исходная 
  <code>make-rat</code>
  :
  </p>
  <pre><code>(define (reduce-integers n d)
    (let ((g (gcd n d)))
      (list (/ n g) (/ d g))))
  </code></pre>
  <p>и определите 
  <code>reduce</code>
   как обобщенную операцию, которая вызывает 
  <code>apply-generic</code>
   и диспетчирует либо к 
  <code>reduce-poly</code>
   (если аргументы — многочлены), либо к 
  <code>reduce-integers</code>
   (для аргументов типа 
  <code>scheme-number</code>
  ). Теперь Вы легко можете заставить пакет рациональной арифметики приводить дроби к наименьшему знаменателю, потребовав от 
  <code>make-rat</code>
   звать 
  <code>reduce</code>
   прежде, чем сочетать данные числитель и знаменатель в процессе порождения рационального числа. Теперь система обрабатывает рациональные выражения и для целых чисел, и для многочленов. Чтобы проверить программу, попробуйте пример, который приведен в начале этого расширенного упражнения:
  </p>
  <pre><code>(define p1 (make-polynomial 'x '((1 1)(0 1))))
  (define p2 (make-polynomial 'x '((3 1)(0 -1))))
  (define p3 (make-polynomial 'x '((1 1))))
  (define p4 (make-polynomial 'x '((2 1)(0 -1))))

  (define rf1 (make-rational p1 p2))
  (define rf2 (make-rational p3 p4))

  (add rf1 rf2)
  </code></pre>
  <p>Посмотрите, удалось ли Вам получить правильный ответ, правильно приведенный к наименьшему знаменателю.</p>
  <p>Вычисление НОД находится в центре всякой системы, работающей с рациональными числами. Алгоритм, который мы использовали в тексте, хотя математически он естествен, работает очень медленно. Медлительность эта проистекает отчасти из большого количества операций деления, а отчасти из огромного размера промежуточных коэффициентов, которые порождаются в ходе псевдоделения. Одна из активно разрабатываемых областей в теории систем алгебраических манипуляций – построение более быстрых алгоритмов для вычисления НОД многочленов.</p>

name: 'Alternative Version Analysis'
description: |
  <p>
      In the 
      <code>make-withdraw</code>
       procedure, the local variable 
      <code>balance</code>
       is created as a parameter of 
      <code> make-withdraw</code>
      . We could also create the local state variable explicitly, using 
      <code>let</code>
      , as follows:
  </p>
  <pre><code>(define (make-withdraw initial-amount)
    (let ((balance initial-amount))
      (lambda (amount)
        (if (>= balance amount)
            (begin (set! balance (- balance amount))
                   balance)
            "Insufficient funds"))))</code></pre>
  <p>
      Recall from section 
      <a href="https://xuanji.appspot.com/isicp/1-3-hop.html#%_sec_1.3.2">1.3.2</a>
       that 
      <code>let</code>
       is simply syntactic sugar for a procedure call:
  </p>
  <pre><code>(let ((&lt;var&gt; &lt;exp&gt;)) &lt;body&gt;)</code></pre>
  <p>
       is interpreted as an alternate syntax for
  </p>
  <pre><code>((lambda (&lt;var&gt;) &lt;body&gt;) &lt;exp&gt;)</code></pre>
  <p>
      Use the environment model to analyze this alternate version of 
      <code>make-withdraw</code>
      , drawing figures like the ones above to illustrate the interactions
  </p>
  <pre><code>(define W1 (make-withdraw 100))

  (W1 50)

  (define W2 (make-withdraw 100))</code></pre>
  <p>
      Show that the two versions of 
      <code>make-withdraw</code>
       create objects with the same behavior. How do the environment structures differ for the two versions?
  </p>

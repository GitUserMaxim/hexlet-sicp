name: 'Анализ альтернативных версий'
description: |
  <p>
      В процедуре 
      <code>make-withdraw</code>
       локальная переменная 
      <code>balance</code>
       создается в виде параметра 
      <code> make-withdraw</code>
      . Можно было бы создать локальную переменную и явно, используя 
      <code>let</code>
      , а именно:
  </p>
  <pre><code>(define (make-withdraw initial-amount)
    (let ((balance initial-amount))
      (lambda (amount)
        (if (>= balance amount)
            (begin (set! balance (- balance amount))
                   balance)
            "Insufficient funds"))))</code></pre>
  <p>
      Напомним, что в разделе 
      <a href="https://xuanji.appspot.com/isicp/1-3-hop.html#%_sec_1.3.2">1.3.2</a>
       говорится, что 
      <code>let</code>
       всего лишь синтаксический сахар для вызова процедуры:
  </p>
  <pre><code>(let ((&lt;var&gt; &lt;exp&gt;)) &lt;body&gt;)</code></pre>
  <p>
       интерпретируется как альтернативный синтаксис для
  </p>
  <pre><code>((lambda (&lt;var&gt;) &lt;body&gt;) &lt;exp&gt;)</code></pre>
  <p>
      С помощью модели с окружениями проанализируйте альтернативную версию 
      <code>make-withdraw</code>
      . Нарисуйте картинки, подобные приведенным в этом разделе, для выражений
  </p>
  <pre><code>(define W1 (make-withdraw 100))

  (W1 50)

  (define W2 (make-withdraw 100))</code></pre>
  <p>
      Покажите, что две версии 
      <code>make-withdraw</code>
       создают объекты с одинаковым поведением. Как различаются структуры окружений в двух версиях?
  </p>

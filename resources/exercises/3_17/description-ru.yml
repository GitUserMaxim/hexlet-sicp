name: 'Число разных пар в структуре'
description: |
  <p>
      Напишите правильную версию процедуры 
      <code>count-pairs</code>
       из упражнения 
      <a title="3.16" href="{{ route('exercises.show', App\Models\Exercise::findByPath('3.16')) }}">3.16</a>
       которая возвращает число различных пар в любой структуре. (Подсказка: просматривайте структуру, поддерживая при этом вспомогательную структуру, следящую за тем, какие пары уже были посчитаны.)
  </p>

name: 'Количество вызовов процедуры'
description: |
  <p>
      При тестировании программ удобно иметь возможность подсчитывать, сколько раз за время вычислений была вызвана та или иная процедура. Напишите процедуру 
      <code>make-monitored</code>
      , принимающую в качестве параметра процедуру 
      <code>f</code>
      , которая сама по себе принимает один входной параметр. Результат, возвращаемый 
      <code>make-monitored</code>
       — третья процедура, назовем ее 
      <code>mf</code>
      , которая подсчитывает, сколько раз она была вызвана, при помощи внутреннего счетчика. Если на входе 
      <code>mf</code>
       получает специальный символ 
      <code>how-many-calls?</code>
      , она возвращает значение счетчика. Если же на вход подается специальный символ 
      <code>reset-count</code>, <code>mf</code>
       обнуляет счетчик. Для любого другого параметра 
      <code>mf</code>
       возвращает результат вызова 
      <code>f</code>
       с этим параметром и увеличивает счетчик. Например, можно было бы сделать отслеживаемую версию процедуры 
      <code>sqrt</code>
      :
  </p>
  <pre><code>(define s (make-monitored sqrt))
  (s 100)
  <i>10</i>
  (s 'how-many-calls?)
  <i>1</i></code></pre>

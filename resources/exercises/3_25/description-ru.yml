name: 'Обобщение одномерных и двухмерных таблиц'
description: |
  <p>
      Обобщая случаи одно- и двумерных таблиц, покажите, как можно реализовать таблицу, в которой элементы хранятся с произвольным количеством ключей и различные значения могут храниться с различным количеством ключей. Процедуры 
      <code>lookup</code>
      и
      <code>insert!</code>
      должны принимать на входе список ключей, с которыми требуется обратиться к таблице.
  </p>

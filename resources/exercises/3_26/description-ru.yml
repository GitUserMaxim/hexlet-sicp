name: 'Упорядоченные ключи в таблице организованной в виде бинарного дерева'
description: |
  <p>
      При поиске в таблице, как она реализована выше, приходится просматривать список записей. В сущности, это представление с неупорядоченным списком из раздела 
      <a href="{{ getChapterOriginLinkForNumber('2.3.3') }}">2.3.3</a>.
      Для больших таблиц может оказаться эффективнее организовать таблицу иначе. Опишите реализацию таблицы, в которой записи (ключ, значение) организованы в виде бинарного дерева, в предположении, что ключи можно каким-то образом упорядочить (например, численно или по алфавиту). (Ср. с упражнением 
      <a title="3.12" href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.66')) }}">2.66</a>
      из главы 2.)
  </p>

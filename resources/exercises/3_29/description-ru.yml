name: 'ИЛИ-элемент как составной блок'
description: |
  <p>
      Еще один способ создать ИЛИ-элемент — это собрать его как составной блок из И-элементов и инверторов. Определите процедуру 
      <code>or-gate</code>
      , которая это осуществляет. Как время задержки ИЛИ-элемента выражается через 
      <code>and-gate-delay</code>
      и
      <code>inverter-delay</code>?
  </p>

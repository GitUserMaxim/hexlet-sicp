name: Квадратор
description: |
  <p>
      Хьюго Дум хочет построить квадратор, блок-ограничение с двумя выводами, такое, что значение соединителя
      <code>b</code>
      на втором выводе всегда будет равно квадрату значения соединителя
      <code>a</code>
      на первом выводе. Он предлагает следующее простое устройство на основе умножителя:
  </p>
  <pre><code>(define (squarer a b)
    (multiplier a a b))
  </code></pre>
  <p>В такой идее есть существенная ошибка. Объясните ее.</p>

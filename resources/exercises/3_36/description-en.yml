name: 'Environment diagram'
description: |
  <p>Suppose we evaluate the following sequence of expressions in the global environment:</p>
  <pre><code>(define a (make-connector))

  (define b (make-connector))

  (set-value! a 10 'user)
  </code></pre>
  <p>At some time during evaluation of the 
  <code>set-value!</code>
  , the following expression from the connector's local procedure is evaluated:
  </p>
  <pre><code>(for-each-except setter inform-about-value constraints)
  </code></pre>
  <p>Draw an environment diagram showing the environment in which the above expression is evaluated.</p>

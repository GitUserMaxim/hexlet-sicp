name: 'Общий счет'
description: |
  <p>Пусть Петр, Павел и Мария имеют общий счет, на котором вначале лежит 100 долларов. Петр кладет на счет 10 долларов, одновременно с этим Павел берет 20, а Мария берет половину денег со счета. При этом они выполняют следующие операции:</p>
  <pre><code>Peter:	(set! balance (+ balance 10))
  Paul:	(set! balance (- balance 20))
  Mary:	(set! balance (- balance (/ balance 2)))
  </code></pre>
  <p>а. Перечислите возможные значения 
  <code>balance</code>
   после завершения операций, предполагая, что банковская система требует от транзакций исполняться последовательно в каком-то порядке.
  </p>
  <p>б. Назовите какие-нибудь другие значения, которые могли бы получиться, если бы система разрешала операциям чередоваться. Нарисуйте временные диаграммы, подобные рис. 3.29, чтобы объяснить, как возникают такие результаты.</p>
  <img class="img-fluid" src="{{ asset("images/exercises/3_38.gif") }}" alt="3.38">
  <p>Рис. 3.29. Временная диаграмма, показывающая, как чередование действий при двух операциях со счетом может привести к неправильному балансу.</p>

name: 'Переопределение объекта-счёта'
description: |
  <p>Хьюго Дум полагает, что теперь, когда операции снятия денег со счета и занесения их на счет перестали сериализовываться автоматически, система банковских счетов стала неоправданно сложной и работать с ней правильным образом чересчур трудно. Он предлагает сделать так, чтобы 
  <code>make-account-and-serializer</code>
   экспортировал сериализатор (для использования в процедурах вроде 
  <code>serialized-exchange</code>
  ), и вдобавок сам использовал его для сериализации простых операций со счетом, как это делал 
  <code>make-account</code>
  . Он предлагает переопределить объект-счет так:
  </p>
  <pre><code>(define (make-account-and-serializer balance)
    (define (withdraw amount)
      (if (>= balance amount)
          (begin (set! balance (- balance amount))
                 balance)
          "Insufficient funds"))
    (define (deposit amount)
      (set! balance (+ balance amount))
      balance)
    (let ((balance-serializer (make-serializer)))
      (define (dispatch m)
        (cond ((eq? m 'withdraw) (balance-serializer withdraw))
              ((eq? m 'deposit) (balance-serializer deposit))
              ((eq? m 'balance) balance)
              ((eq? m 'serializer) balance-serializer)
              (else (error "Unknown request -- MAKE-ACCOUNT"
                           m))))
      dispatch))
  </code></pre>
  <p>Затем снятия обрабатываются так же, как с оригинальным 
  <code>make-account</code>
  :
  </p>
  <pre><code>(define (deposit account amount)
   ((account 'deposit) amount))
  </code></pre>
  <p>Объясните, в чем Хьюго ошибается. В частности, рассмотрите, что происходит при вызове 
  <code>serialized-exchange</code>
  .
  </p>

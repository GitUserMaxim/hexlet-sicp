name: 'Реализации семафоров'
description: |
  <p>Семафор (размера 
  <code>n</code>
  ) представляет собой обобщение мьютекса. Подобно мьютексу, семафор поддерживает операции захвата и освобождения, но захватить его одновременно могут до 
  <code>n</code>
   процессов. Прочие процессы, которые попытаются захватить семафор, должны будут ждать освобождения. Дайте реализацию семафоров
  </p>
  <p>а. в терминах мьютексов.</p>
  <p>б. в терминах атомарных операций 
  <code>test-and-set!</code>
  .
  </p>

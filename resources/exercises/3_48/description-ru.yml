name: 'Serialized-exchange с использованием метода избежания тупиков'
description: |
  <p>Подробно объясните, почему метод избежания тупиков, описанный выше (т. е. счета нумеруются, и каждый процесс сначала пытается захватить счет с меньшим номером), в самом деле позволяет избежать тупика в задаче обмена балансов. Перепишите 
  <code>serialized-exchange</code>
   с использованием этой идеи. (Придется также изменить 
  <code>make-account</code>
  , так, чтобы каждый счет создавался вместе с номером, и чтобы этот номер можно было считать, послав соответствующее сообщение.)
  </p>

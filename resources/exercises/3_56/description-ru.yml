name: 'Задача Хэмминга о порождении чисел'
description: |
  <p>Существует знаменитая задача, впервые сформулированная Р. Хэммингом: породить в возрастающем порядке и без повторений все положительные целые числа, у которых нет других простых делителей, кроме 
  <code>2, 3</code>
   и 
  <code>5</code>
  . Очевидное решение состоит в том, чтобы перебирать все натуральные числа по очереди и проверять, есть ли у них простые множители помимо 
  <code>2, 3</code>
   и 
  <code>5</code>
  .  Однако эта процедура весьма неэффективна, поскольку чем больше числа, тем меньшая их доля соответствует условию. Применим альтернативный подход: назовем искомый поток чисел 
  <code>S</code>
   и обратим внимание на следующие факты:
  </p>
  <p>• 
  <code>S</code>
   начинается с 
  <code>1</code>
  .
  </p>
  <p>• Элементы 
  <code>(scale-streams 2)</code>
   также принадлежат 
  <code>S</code>
  .
  </p>
  <p>• То же верно и для 
  <code>(scale-stream S 3)</code>
   и 
  <code>(scale-stream S 5)</code>
  .
  </p>
  <p>• Других элементов 
  <code>S</code>
   нет.
  </p>
  <p>Теперь требуется только соединить элементы из этих источников. Для этого мы определяем процедуру 
  <code>merge</code>
  , которая сливает два упорядоченных потока в один упорядоченный поток, убирая при этом повторения:
  </p>
  <pre><code>(define (merge s1 s2)
    (cond ((stream-null? s1) s2)
          ((stream-null? s2) s1)
          (else
           (let ((s1car (stream-car s1))
                 (s2car (stream-car s2)))
             (cond ((< s1car s2car)
                    (cons-stream s1car (merge (stream-cdr s1) s2)))
                   ((> s1car s2car)
                    (cons-stream s2car (merge s1 (stream-cdr s2))))
                   (else
                    (cons-stream s1car
                                 (merge (stream-cdr s1)
                                        (stream-cdr s2)))))))))
  </code></pre>
  <p>Тогда требуемый поток можно получить с помощью 
  <code>merge</code>
   таким образом:
  </p>
  <pre><code>(define S (cons-stream 1 (merge &lt;??&gt; &lt;??&gt;)))
  </code></pre>
  <p>Заполните пропуски в местах, обозначенных знаком 
  <code>&lt;??&gt;</code>
  .
  </p>

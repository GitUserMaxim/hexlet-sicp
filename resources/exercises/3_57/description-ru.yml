name: 'Сложения при вычислении чисел Фибоначчи'
description: |
  <p>Сколько сложений происходит при вычислении 
  <code>n</code>
  -го числа Фибоначчи, в случае, когда мы используем определение 
  <code>fibs</code>
   через процедуру 
  <code>add-streams</code>
  ? Покажите, что число сложений выросло бы экспоненциально, если бы мы реализовали 
  <code>(delay &lt;exp&gt;)</code>
   просто как 
  <code>(lambda () &lt;exp&gt;)</code>
  , без оптимизации через процедуру 
  <code>memo-proc</code>
   из раздела 3.5.1.
  </p>

name: 'Степенныe ряды представленные в виде бесконечных потоков'
description: |
  <p>В разделе 2.5.3 мы увидели, как реализовать систему арифметики многочленов, используя представление многочленов в виде списка термов. Подобным же образом можно работать со степенными рядами (power series), например </p>
  <img class="img-fluid" src="{{ asset("images/exercises/3_59_1.gif") }}" alt="3.59_1">
  <p>представленными в виде бесконечных потоков. Будем представлять последовательность 
  <code>a₀ + a₁x + a₂x² + a₃x³ + ···</code>
   как поток, элементами которого являются коэффициенты 
  <code>a₀, a₁, a₂, a₃, ...</code>
  .
  </p>
  <p>а. Интеграл последовательности 
  <code>a₀ + a₁x + a₂x² + a₃x³ + ···</code>
   есть последовательность
  </p>
  <img class="img-fluid" src="{{ asset("images/exercises/3_59_2.gif") }}" alt="3.59_2">
  <p>где 
  <code>c</code>
   — произвольная константа. Определите процедуру 
  <code>integrate-series</code>
  , которая на входе принимает поток 
  <code>a₀, a₁, a₂, ...</code>
  , представляющую степенной ряд, и возвращает поток 
  <code>a₀, (1/2)a₁, (1/3)a₂, ...</code>
   коэффициентов при неконстантных членах интеграла последовательности. (Поскольку в результате отсутствует постоянный член, он не представляет собой степенной ряд; при использовании 
  <code>integrate-series</code>
   мы через 
  <code>cons</code>
   будем присоединять к началу соответствующую константу.)
  </p>
  <p>б. Функция 
  <code>x → eˣ</code>
   равна своей собственной производной. Отсюда следует, что 
  <code>eˣ</code>
   и интеграл 
  <code>eˣ</code>
   суть одна и та же последовательность, с точностью до постоянного члена, который равен 
  <code>e⁰ = 1</code>
  . Соответственно, можно породить последовательность для 
  <code>eˣ</code>
   через
  </p>
  <pre><code>(define exp-series
    (cons-stream 1 (integrate-series exp-series)))
  </code></pre>
  <p>Покажите, как породить последовательности для синуса и косинуса, опираясь на то, что производная синуса равна косинусу, а производная косинуса равна минус синусу:</p>
  <pre><code>(define cosine-series
    (cons-stream 1 &lt;??&gt;))
  (define sine-series
    (cons-stream 0 &lt;??&gt;))
  </code></pre>

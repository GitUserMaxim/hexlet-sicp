name: 'Порядок пар в потоке'
description: |
  <p>Рассмотрим поток 
  <code>(pairs integers integers)</code>
  . Можете ли Вы что-то сказать о порядке, в котором пары попадают в поток? Например, сколько приблизительно пар предшествуют паре 
  <code>(1, 100)</code>
  ? Паре 
  <code>(99, 100)</code>
  ? 
  <code>(100, 100)</code>
  ? (Если Вы способны предоставить точные математические утверждения, — прекрасно. Однако если Вы увязаете в деталях, достаточно качественных оценок.)
  </p>

name: 'Alternative definition of pairs'
description: |
  <p>Louis Reasoner thinks that building a stream of pairs from three parts is unnecessarily complicated. Instead of separating the pair 
  <code>(S₀, T₀)</code>
   from the rest of the pairs in the first row, he proposes to work with the whole first row, as follows:
  </p>
  <pre><code>(define (pairs s t)
    (interleave
     (stream-map (lambda (x) (list (stream-car s) x))
                 t)
     (pairs (stream-cdr s) (stream-cdr t))))
  </code></pre>
  <p>Does this work? Consider what happens if we evaluate 
  <code>(pairs integers integers)</code>
   using Louis's definition of pairs.
  </p>

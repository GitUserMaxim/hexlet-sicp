name: 'Процедура smooth'
description: |
  <p>Ева Лу Атор недовольна подходом Хьюго из упражнения <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('3.75')) }}">3.75</a>
  . Написанная им программа не модульна, поскольку смешивает операции сглаживания и отлова пересечений ноля. Например, тест на пересечение не должен изменяться, если Лизе удастся найти другой способ улучшить качество входного сигнала. Помогите Хьюго и напишите процедуру 
  <code>smooth</code>
  , которая берет на входе поток, а на выходе выдает поток, элементы которого получены усреднением каждых двух последовательных элементов входного потока. Затем используйте 
  <code>smooth</code>
   как компоненту и реализуйте детектор перехода через ноль в более модульном стиле.
  </p>

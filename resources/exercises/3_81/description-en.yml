name: 'Stream of random numbers'
description: |
  <p>Exercise <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('3.6')) }}">3.6</a>
   discussed generalizing the random-number generator to allow one to reset the random-number sequence so as to produce repeatable sequences of ''random'' numbers. Produce a stream formulation of this same generator that operates on an input stream of requests to 
  <code>generate</code>
   a new random number or to 
  <code>reset</code>
   the sequence to a specified value and that produces the desired stream of random numbers. Don't use assignment in your solution.
  </p>

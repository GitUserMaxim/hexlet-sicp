name: 'Evaluation order'
description: |
  <p>Notice that we cannot tell whether the metacircular evaluator evaluates operands from left to right or from right to left. Its evaluation order is inherited from the underlying Lisp: If the arguments to 
  <code>cons</code>
   in 
  <code>list-of-values</code>
   are evaluated from left to right, then 
  <code>list-of-values</code>
   will evaluate operands from left to right; and if the arguments to 
  <code>cons</code>
   are evaluated from right to left, then 
  <code>list-of-values</code>
   will evaluate operands from right to left.
  </p>
  <p>Write a version of 
  <code>list-of-values</code>
   that evaluates operands from left to right regardless of the order of evaluation in the underlying Lisp. Also write a version that evaluates operands from right to left.
  </p>

name: 'Разработайте новый синтаксис для Scheme'
description: |
  <p>При помощи абстракции данных мы смогли написать процедуру 
  <code>eval</code>
   так, что она не зависит от конкретного синтаксиса интерпретируемого языка. Чтобы проиллюстрировать это свойство, разработайте новый синтаксис для Scheme, изменив процедуры из этого раздела и ничего не трогая в 
  <code>eval</code>
   и 
  <code>apply</code>
  .
  </p>

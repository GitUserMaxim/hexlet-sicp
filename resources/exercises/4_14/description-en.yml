name: "Why Louis's map fails?"
description: |
  <p>Eva Lu Ator and Louis Reasoner are each experimenting with the metacircular evaluator. Eva types in the definition of 
  <code>map</code>
  , and runs some test programs that use it. They work fine. Louis, in contrast, has installed the system version of 
  <code>map</code>
   as a primitive for the metacircular evaluator. When he tries it, things go terribly wrong. Explain why Louis's 
  <code>map</code>
   fails even though Eva's works.
  </p>

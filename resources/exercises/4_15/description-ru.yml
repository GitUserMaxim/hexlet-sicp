name: 'Покажите, что невозможно написать процедуру halts?'
description: |
  <p>Если даны одноаргументная процедура 
  <code>p</code>
   и объект 
  <code>a</code>
  , то говорят, что 
  <code>p</code>
   «останавливается» на 
  <code>a</code>
  , если выражение 
  <code>(p a)</code>
   возвращает значение (а не печатает сообщение об ошибке или выполняется вечно). Покажите, что невозможно написать процедуру 
  <code>halts?</code>
  , которая бы точно определяла для любой процедуры 
  <code>p</code>
   и любого объекта 
  <code>a</code>
  , останавливается ли 
  <code>p</code>
   на 
  <code>a</code>
  . Используйте следующее рассуждение: если бы имелась такая процедура 
  <code>halts?</code>
  , можно было бы написать следующую программу:
  </p>
  <pre><code>(define (run-forever) (run-forever))

  (define (try p)
    (if (halts? p p)
        (run-forever)
        'halted))</code></pre>
  <p>Теперь рассмотрите выражение 
  <code>(try try)</code>
   и покажите, что любое возможное завершение (остановка или вечное выполнение) нарушает требуемое поведение 
  <code>halts?</code>
  .
  </p>

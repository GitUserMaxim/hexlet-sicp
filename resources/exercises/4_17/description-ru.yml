name: 'Нарисуйте диаграммы окружения'
description: |
  <p>Нарисуйте диаграммы окружения, которое находится в силе в момент выполнения выражения 
  <code>&lt;e3&gt;</code>
   из процедуры выше по тексту, и сравните его устройство при последовательной обработке определений и при описанном выше преобразовании. Откуда в преобразованной программе берется дополнительный кадр? Объясните, почему это различие никогда не отражается на поведении корректных программ. Придумайте, как заставить интерпретатор реализовать правило «одновременной» сферы действия для внутренних определений без создания дополнительного кадра.
  </p>

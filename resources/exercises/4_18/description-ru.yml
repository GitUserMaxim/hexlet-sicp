name: 'Альтернативная стратегия обработки определений'
description: |
  <p>Рассмотрим альтернативную стратегию обработки определений, которая переводит пример из текста в</p>
  <pre><code>(lambda &lt;vars&gt;
    (let ((u '*unassigned*)
          (v '*unassigned*))
      (let ((a &lt;e1&gt;)
            (b &lt;e2&gt;))
        (set! u a)
        (set! v b))
      &lt;e3&gt;))</code></pre>
  <p>Здесь 
  <code>a</code>
   и 
  <code>b</code>
   представляют новые имена переменных, созданные интерпретатором, которые не встречаются в пользовательской программе. Рассмотрим процедуру 
  <code>solve</code>
   из раздела 3.5.4:
  </p>
  <pre><code>(define (solve f y0 dt)
    (define y (integral (delay dy) y0 dt))
    (define dy (stream-map f y))
    y)</code></pre>
  <p>Будет ли эта процедура работать, если внутренние определения преобразуются так, как предлагается в этом упражнении? А если так, как в тексте раздела? Объясните.</p>

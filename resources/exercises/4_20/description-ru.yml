name: 'Особая форма letrec'
description: |
  <p>Поскольку внутренние определения выглядят последовательными, а на самом деле параллельны, некоторые предпочитают их вовсе избегать и вместо этого пользуются особой формой 
  <code>letrec</code>
  . 
  <code>Letrec</code>
   выглядит так же, как 
  <code>let</code>
  , поэтому неудивительно, что переменные в нем связываются одновременно и имеют одинаковую для всех сферу действия. Можно переписать процедуру-пример 
  <code>f</code>
   из текста без внутренних определений, но при этом в точности с тем же значением, так:
  </p>
  <pre><code>(define (f x)
    (letrec ((even?
              (lambda (n)
                (if (= n 0)
                    true
                    (odd? (- n 1)))))
             (odd?
              (lambda (n)
                (if (= n 0)
                    false
                    (even? (- n 1))))))
      &lt;rest of body of f&gt;))</code></pre>
  <p>Выражение 
  <code>letrec</code>
   имеет вид
  </p>
  <pre><code>(letrec ((&lt;var1&gt; &lt;exp1&gt;) ... (&lt;varn&gt; &lt;expn&gt;))
    body)</code></pre>
  <p>и является вариантом 
  <code>let</code>
  , в котором выражения 
  <code>&lt;expk&gt;</code>
  , устанавливающие начальные значения для переменных 
  <code>&lt;vark&gt;</code>
  , вычисляются в окружении, которое включает все связывания 
  <code>letrec</code>
  . Это делает возможным рекурсию между связываниями, к примеру, взаимную рекурсию 
  <code>even?</code>
   и 
  <code>odd?</code>
   в последнем примере, или вычисление факториала 
  <code>10</code>
   через
  </p>
  <pre><code>(letrec ((fact
            (lambda (n)
              (if (= n 1)
                  1
                  (* n (fact (- n 1)))))))
    (fact 10))</code></pre>
  <p>а. Реализуйте 
  <code>letrec</code>
   как производное выражение, переводя выражение 
  <code>letrec</code>
   в выражение 
  <code>let</code>
  , как показано в тексте раздела или в упражнении 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('4.18')) }}">4.18</a>
  . То есть переменные 
  <code>letrec</code>
   должны создаваться в 
  <code>let</code>
  , а затем получать значение через 
  <code>set!</code>
  .
  </p>
  <p>б. Хьюго Дум совсем запутался во всех этих внутренних определениях. Ему кажется, что если кому-то не нравятся 
  <code>define</code>
   внутри процедуры, то пусть пользуются обычным 
  <code>let</code>
  . Покажите, что в его рассуждениях неверно. Нарисуйте диаграмму, показывающую окружение, в котором выполняется 
  <code>&lt;rest of body of f&gt;</code>
   во время вычисления выражения 
  <code>(f 5)</code>
  , если 
  <code>f</code>
   определена как в этом упражнении. Нарисуйте диаграмму окружений для того же вычисления, но только с 
  <code>let</code>
   на месте 
  <code>letrec</code>
   в определении 
  <code>f</code>
  .
  </p>

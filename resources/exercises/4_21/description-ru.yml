name: 'Рекурсивные процедуры без letrec'
description: |
  <p>Как ни удивительно, интуитивная догадка Хьюго (в упражнении <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('4.20')) }}">4.20</a>
  ) оказывается верной. Действительно, можно строить рекурсивные процедуры без использования 
  <code>letrec</code>
   (и даже без 
  <code>define</code>
  ), только способ это сделать намного тоньше, чем казалось Хьюго. Следующее выражение вычисляет факториал 
  <code>10</code>
   с помощью рекурсивной процедуры:
  </p>
  <pre><code>((lambda (n)
     ((lambda (fact)
        (fact fact n))
      (lambda (ft k)
        (if (= k 1)
            1
            (* k (ft ft (- k 1)))))))
   10)</code></pre>
  <p>а. Проверьте, что это выражение на самом деле считает факториалы (вычисляя его). Постройте аналогичное выражение для вычисления чисел Фибоначчи.</p>
  <p>б. Рассмотрим следующую процедуру, включающую взаимно рекурсивные внутренние определения:</p>
  <pre><code>(define (f x)
    (define (even? n)
      (if (= n 0)
          true
          (odd? (- n 1))))
    (define (odd? n)
      (if (= n 0)
          false
          (even? (- n 1))))
    (even? x))</code></pre>
  <p>Восстановите пропущенные фрагменты так, чтобы получилось альтернативное определение 
  <code>f</code>
  , где нет ни внутренних определений, ни 
  <code>letrec</code>
  :
  </p>
  <pre><code>(define (f x)
    ((lambda (even? odd?)
       (even? even? odd? x))
     (lambda (ev? od? n)
       (if (= n 0) true (od? ?? ?? ??)))
     (lambda (ev? od? n)
       (if (= n 0) false (ev? ?? ?? ??)))))</code></pre>

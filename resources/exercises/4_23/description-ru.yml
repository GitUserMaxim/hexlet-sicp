name: 'Сравните две версии analyze-sequence'
description: |
  <p>Лиза П. Хакер не понимает, зачем делать 
  <code>analyze-sequence</code>
   такой сложной. Все остальные процедуры анализа — простые трансформации соответствующих вычисляющих процедур (или ветвей 
  <code>eval</code>
  ) из раздела 4.1.1. Лиза ожидала, что 
  <code>analyze-sequence</code>
   будет выглядеть так:
  </p>
  <pre><code>(define (analyze-sequence exps)
    (define (execute-sequence procs env)
      (cond ((null? (cdr procs)) ((car procs) env))
            (else ((car procs) env)
                  (execute-sequence (cdr procs) env))))
    (let ((procs (map analyze exps)))
      (if (null? procs)
          (error "Empty sequence -- ANALYZE"))
      (lambda (env) (execute-sequence procs env))))</code></pre>
  <p>Ева Лу Атор объясняет Лизе, что версия в тексте проделывает больше работы по вычислению последовательности во время анализа. В Лизиной исполнительной процедуре вызовы частичных исполнительных процедур, вместо того, чтобы быть встроенными, перебираются в цикле. В результате, хотя отдельные выражения в последовательности оказываются проанализированы, сама последовательность анализируется во время выполнения.</p>
  <p>Сравните две версии 
  <code>analyze-sequence</code>
  . Рассмотрите, например, обычный случай (типичный для тел процедур), когда в последовательности только одно выражение. Какую работу будет делать исполнительная процедура, предложенная Лизой? А процедура из текста раздела? Как соотносятся эти две процедуры в случае последовательности из двух выражений?
  </p>

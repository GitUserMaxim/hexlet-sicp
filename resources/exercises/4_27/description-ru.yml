name: 'Взаимодействие между ленивыми вычислениями и побочными эффектами'
description: |
  <p>Допустим, мы вводим в ленивый интерпретатор следующее выражение:</p>
  <pre><code>(define count 0)
  (define (id x)
    (set! count (+ count 1))
    x)</code></pre>
  <p>Вставьте пропущенные значения в данной ниже последовательности действий и объясните свои ответы:</p>
  <pre><code>(define w (id (id 10)))
  ;;; L-Eval input:
  count
  ;;; L-Eval value:
  &lt;response&gt;
  ;;; L-Eval input:
  w
  ;;; L-Eval value:
  &lt;response&gt;
  ;;; L-Eval input:
  count
  ;;; L-Eval value:
  &lt;response&gt;</code></pre>

name: 'Продемонстрируйте преимущества мемоизации'
description: |
  <p>Придумайте пример программы, которая, по Вашему мнению, будет работать намного медленнее без мемоизации, чем с мемоизацией. Рассмотрим, помимо этого, следующую последовательность действий, в которой процедура 
  <code>id</code>
   определена как в упражнении 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('4.27')) }}">4.27</a>
  , а счетчик 
  <code>count</code>
   начинает с 
  <code>0</code>
  :
  </p>
  <pre><code>(define (square x)
    (* x x))
  ;;; L-Eval input:
  (square (id 10))
  ;;; L-Eval value:
  &lt;response&gt;
  ;;; L-Eval input:
  count
  ;;; L-Eval value:
  &lt;response&gt;</code></pre>
  <p>Укажите, как будет выглядеть вывод в случае с мемоизирующим интерпретатором и с немемоизирующим.</p>

name: 'Working with sequences in the lazy evaluator'
description: |
  <p>Cy D. Fect, a reformed C programmer, is worried that some side effects may never take place, because the lazy evaluator doesn't force the expressions in a sequence. Since the value of an expression in a sequence other than the last one is not used (the expression is there only for its effect, such as assigning to a variable or printing), there can be no subsequent use of this value (e.g., as an argument to a primitive procedure) that will cause it to be forced. Cy thus thinks that when evaluating sequences, we must force all expressions in the sequence except the final one. He proposes to modify 
  <code>eval-sequence</code>
   from section 4.1.1 to use 
  <code>actual-value</code>
   rather than 
  <code>eval</code>
  :
  </p>
  <pre><code>(define (eval-sequence exps env)
    (cond ((last-exp? exps) (eval (first-exp exps) env))
          (else (actual-value (first-exp exps) env)
                (eval-sequence (rest-exps exps) env))))</code></pre>
  <p>a. Ben Bitdiddle thinks Cy is wrong. He shows Cy the 
  <code>for-each</code>
   procedure described in exercise 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.23')) }}">2.23</a>
   which gives an important example of a sequence with side effects:</p>
  <pre><code>(define (for-each proc items)
    (if (null? items)
        'done
        (begin (proc (car items))
               (for-each proc (cdr items)))))</code></pre>
  <p>He claims that the evaluator in the text (with the original 
  <code>eval-sequence</code>
  ) handles this correctly:
  </p>
  <pre><code>;;; L-Eval input:
  (for-each (lambda (x) (newline) (display x))
            (list 57 321 88))
  <i>57</i>
  <i>321</i>
  <i>88</i>
  ;;; L-Eval value:
  <i>done</i></code></pre>
  <p>Explain why Ben is right about the behavior of 
  <code>for-each</code>
  .
  </p>
  <p>b. Cy agrees that Ben is right about the 
  <code>for-each</code>
   example, but says that that's not the kind of program he was thinking about when he proposed his change to 
  <code>eval-sequence</code>
  . He defines the following two procedures in the lazy evaluator:
  </p>
  <pre><code>(define (p1 x)
    (set! x (cons x '(2)))
    x)

  (define (p2 x)
    (define (p e)
      e
      x)
    (p (set! x (cons x '(2)))))</code></pre>
  <p>What are the values of 
  <code>(p1 1)</code>
   and 
  <code>(p2 1)</code>
   with the original 
  <code>eval-sequence</code>
  ? What would the values be with Cy's proposed changes?
  </p>
  <p>c. Cy also points out that changing 
  <code>eval-sequence</code>
   as he proposes does not affect the behavior of the example in part a. Explain why this is true.
  </p>
  <p>d. How do you think sequences ought to be treated in the lazy evaluator? Do you like Cy's approach, the approach in the text, or some other approach?</p>

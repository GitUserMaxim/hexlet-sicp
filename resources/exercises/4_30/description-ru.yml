name: 'Работа с последовательностями в ленивом интерпретаторе'
description: |
  <p>Пабло Э. Фект, бывший программист на языке C, беспокоится, что ленивый интерпретатор не вынуждает выражения в последовательности, и оттого некоторые побочные эффекты могут никогда не произойти. Поскольку ни у одного выражения в последовательности, помимо конечного, значение не используется (выражение стоит там только ради своего эффекта, например, чтобы присвоить значение переменной или что-нибудь напечатать), у значения такого выражения не может впоследствии быть применения, для которого его потребуется вынудить (например, в качестве аргумента элементарной процедуры). Поэтому П.Э. Фект считает, что при выполнении последовательности нужно все выражения, кроме последнего, вынуждать. Он предлагает изменить 
  <code>eval-sequence</code>
   из раздела 4.1.1 так, чтобы она использовала 
  <code>actual-value</code>
   вместо 
  <code>eval</code>
  :
  </p>
  <pre><code>(define (eval-sequence exps env)
    (cond ((last-exp? exps) (eval (first-exp exps) env))
          (else (actual-value (first-exp exps) env)
                (eval-sequence (rest-exps exps) env))))</code></pre>
  <p>а. Бен Битобор считает, что Пабло неправ. Он показывает ему процедуру 
  <code>for-each</code>
   из упражнения 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.23')) }}">2.23</a>
   — важный пример последовательности с побочными эффектами:</p>
  <pre><code>(define (for-each proc items)
    (if (null? items)
        'done
        (begin (proc (car items))
               (for-each proc (cdr items)))))</code></pre>
  <p>Он утверждает, что интерпретатор из текста (с исходным 
  <code>eval-sequence</code>
  ) правильно работает с этой процедурой:
  </p>
  <pre><code>;;; L-Eval input:
  (for-each (lambda (x) (newline) (display x))
            (list 57 321 88))
  <i>57</i>
  <i>321</i>
  <i>88</i>
  ;;; L-Eval value:
  <i>done</i></code></pre>
  <p>Объясните, почему Бен прав насчет поведения 
  <code>for-each</code>
  .
  </p>
  <p>б. Пабло соглашается с Беном по поводу примера с 
  <code>for-each</code>
  , но говорит, что, предлагая изменить 
  <code>eval-sequence</code>
  , он имел в виду другой тип программ. Он определяет в ленивом интерпретаторе следующие две процедуры:
  </p>
  <pre><code>(define (p1 x)
    (set! x (cons x '(2)))
    x)

  (define (p2 x)
    (define (p e)
      e
      x)
    (p (set! x (cons x '(2)))))</code></pre>
  <p>Какие значения вернут 
  <code>(p1 1)</code>
   и 
  <code>(p2 1)</code>
   с исходной 
  <code>eval-sequence</code>
  ? Каковы будут значения с изменением, которое предлагает Пабло?
  </p>
  <p>в. Пабло указывает также, что изменение 
  <code>eval-sequence</code>
  , которое он предлагает, не влияет на поведение примера из части a. Объясните, почему это так.
  </p>
  <p>г. Как, по-Вашему, нужно работать с последовательностями в ленивом интерпретаторе? Что Вам нравится больше: подход Пабло, подход, приведенный в тексте, или что-нибудь третье?</p>

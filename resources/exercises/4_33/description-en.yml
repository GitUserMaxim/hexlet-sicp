name: "Modify the evaluator's treatment of quoted expressions"
description: |
  <p>Ben Bitdiddle tests the lazy list implementation given above by evaluating the expression</p>
  <pre><code>(car '(a b c))</code></pre>
  <p>To his surprise, this produces an error. After some thought, he realizes that the "lists" obtained by reading in quoted expressions are different from the lists manipulated by the new definitions of 
  <code>cons</code>
  , 
  <code>car</code>
  , and 
  <code>cdr</code>
  . Modify the evaluator's treatment of quoted expressions so that quoted lists typed at the driver loop will produce true lazy lists.
  </p>

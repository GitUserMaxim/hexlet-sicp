name: 'Efficiency of generating Pythagorean triples'
description: |
  <p>Ben Bitdiddle claims that the following method for generating Pythagorean triples is more efficient than the one in exercise <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('4.35')) }}">4.35</a>
  . Is he correct? (Hint: Consider the number of possibilities that must be explored.)</p>
  <pre><code>(define (a-pythagorean-triple-between low high)
    (let ((i (an-integer-between low high))
          (hsq (* high high)))
      (let ((j (an-integer-between i high)))
        (let ((ksq (+ (* i i) (* j j))))
          (require (>= hsq ksq))
          (let ((k (sqrt ksq)))
            (require (integer? k))
            (list i j k))))))</code></pre>

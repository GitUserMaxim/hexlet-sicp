name: 'Порядок ограничений в процедуре multiple-dwelling'
description: |
  <p>Влияет ли порядок ограничений в процедуре 
  <code>multiple-dwelling</code>
   на ответ? Влияет ли он на время, необходимое для поиска ответа? Если Вы считаете, что он имеет значение, то покажите, как можно ускорить программу, переупорядочив ограничения. Если Вы считаете, что порядок значения не имеет, объясните, почему.
  </p>

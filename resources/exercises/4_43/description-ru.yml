name: 'Кто отец Лорны?'
description: |
  <p>Решите с помощью 
  <code>amb</code>
  -интерпретатора следующую задачу.
  </p>
  <p>У отца Мэри Энн Мур есть яхта, и у каждого из четверых его друзей тоже. Эти четверо друзей — полковник Даунинг, мистер Холл, сэр Барнакл Худ и доктор Паркер. У каждого из них тоже есть по дочери, и каждый из них назвал свою яхту в честь дочери одного из своих друзей. Яхта сэра Барнакла называется Габриэлла, яхта мистера Мура — Лорна, а у мистера Холла яхта Розалинда. Мелисса, яхта полковника Даунинга, названа в честь дочери сэра Барнакла. Отец Габриэллы владеет яхтой, названной в честь дочери доктора Паркера. Кто отец Лорны?</p>
  <p>Попытайтесь написать программу так, чтобы она работала эффективно (см. упражнение <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('4.40')) }}">4.40</a>
  ). Кроме того, определите, сколько будет решений, если не указывается, что фамилия Мэри Энн — Мур.</p>

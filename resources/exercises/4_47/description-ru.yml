name: 'Альтернативный вариант parse-verb-phrase'
description: |
  <p>Хьюго Дум говорит, что поскольку глагольная группа — это либо глагол, либо глагольная группа плюс предложная группа, было бы намного естественнее определить процедуру 
  <code>parse-verb-phrase</code>
   так (и то же сделать для именных групп):
  </p>
  <pre><code>(define (parse-verb-phrase)
    (amb (parse-word verbs)
         (list 'verb-phrase
               (parse-verb-phrase)
               (parse-prepositional-phrase))))
  </code></pre>
  <p>Работает ли этот вариант? Изменится ли поведение программы, если мы поменяем местами выражения в 
  <code>amb</code>
  ?
  </p>

name: 'Измените обработку cond'
description: |
  <p>В языке Scheme есть дополнительная разновидность синтаксиса вариантов 
  <code>cond</code>
  , 
  <code>(&lt;test&gt; => &lt;recipient&gt;)</code>
  . Если результат вычисления 
  <code>&lt;test&gt;</code>
   оказывается истинным значением, то вычисляется 
  <code>&lt;recipient&gt;</code>
  . Его значение должно быть одноместной процедурой; эта процедура вызывается со значением 
  <code>&lt;test&gt;</code>
   в качестве аргумента, и результат этого вызова возвращается как значение выражения 
  <code>cond</code>
  . Например,
  </p>
  <pre><code>(cond ((assoc ’b ’((a 1) (b 2))) => cadr)
        (else false))</code></pre>
  <p>имеет значение 
  <code>2</code>
  . Измените обработку 
  <code>cond</code>
   так, чтобы она поддерживала этот расширенный синтаксис.
  </p>

name: 'If-fail construct'
description: |
  <p>Implement a new construct called 
  <code>if-fail</code>
   that permits the user to catch the failure of an expression. 
  <code>If-fail</code>
   takes two expressions. It evaluates the first expression as usual and returns as usual if the evaluation succeeds. If the evaluation fails, however, the value of the second expression is returned, as in the following example:
  </p>
  <pre><code>;;; Amb-Eval input:
  (if-fail (let ((x (an-element-of '(1 3 5))))
             (require (even? x))
             x)
           'all-odd)
  ;;; Starting a new problem
  ;;; Amb-Eval value:
  <i>all-odd</i>
  ;;; Amb-Eval input:
  (if-fail (let ((x (an-element-of '(1 3 5 8))))
             (require (even? x))
             x)
           'all-odd)
  ;;; Starting a new problem
  ;;; Amb-Eval value:
  <i>8</i>
  </code></pre>

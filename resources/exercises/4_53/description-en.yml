name: 'The result of evaluating'
description: |
  <p>With 
  <code>permanent-set!</code>
   as described in exercise 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('4.51')) }}">4.51</a>
   and 
  <code>if-fail</code>
   as in exercise 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('4.52')) }}">4.52</a>
  , what will be the result of evaluating</p>
  <pre><code>(let ((pairs '()))
    (if-fail (let ((p (prime-sum-pair '(1 3 5 8) '(20 35 110))))
               (permanent-set! pairs (cons p pairs))
               (amb))
             pairs))
  </code></pre>

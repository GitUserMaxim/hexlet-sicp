name: 'Правило meeting-time'
description: |
  <p>Бен Битобор пропускает слишком много совещаний. Опасаясь потерять из-за этой глупой привычки работу, он решает, что с ней надо что-то делать. Он добавляет данные обо всех еженедельных совещаниях в базу данных «Микрошафт» в виде следующих утверждений:</p>
  <pre><code>(meeting accounting (Monday 9am))
  (meeting administration (Monday 10am))
  (meeting computer (Wednesday 3pm))
  (meeting administration (Friday 1pm))
  </code></pre>
  <p>Все эти утверждения сообщают о совещаниях отделов. Кроме того, Бен вводит утверждение о совещании всей компании, которое относится ко всем отделам. Все сотрудники компании должны ходить на это совещание.</p>
  <pre><code>(meeting whole-company (Wednesday 4pm))
  </code></pre>
  <p>а. В пятницу утром Бен хочет спросить у базы данных, какие совещания происходят в этот день. Как ему надо составить запрос?</p>
  <p>б. Лиза П. Хакер недовольна. Она считает, что намного полезнее было бы, если бы можно было спрашивать о совещаниях, указывая свое имя. Она пишет правило, гласящее, что совещания, куда служащему надо ходить, это совещания всей компании и совещания отдела, где он работает. Допишите тело Лизиного правила.</p>
  <pre><code>(rule (meeting-time ?person ?day-and-time)
        &lt;rule-body&gt;)
  </code></pre>
  <p>в. Лиза приходит на работу в среду и хочет узнать, на какие совещания ей нужно идти в этот день. Если имеется правило 
  <code>meeting-time</code>
  , то какой запрос ей надо подать?
  </p>

name: 'Запрос lives-near'
description: |
  <p>Подав запрос</p>
  <pre><code>(lives-near ?person (Hacker Alyssa P))
  </code></pre>
  <p>Лиза П. Хакер (Alyssa P. Hacker) может найти людей, которые живут с ней рядом, и с которыми она вместе может ездить на работу. С другой стороны, когда она пытается найти все пары людей, живущих друг около друга, при помощи запроса</p>
  <pre><code>(lives-near ?person-1 ?person-2)
  </code></pre>
  <p>она видит, что каждая подходящая пара людей попадается в выводе дважды, например</p>
  <pre><code>(lives-near (Hacker Alyssa P) (Fect Cy D))
  (lives-near (Fect Cy D) (Hacker Alyssa P))
  </code></pre>
  <p>Почему так происходит? Можно ли получить список людей, живущих рядом друг с другом, в котором каждая пара появлялась бы по одному разу? Ответ объясните.</p>

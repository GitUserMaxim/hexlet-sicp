name: 'Rules for last-pair'
description: |
  <p>Define rules to implement the 
  <code>last-pair</code>
   operation of exercise 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.17')) }}">2.17</a>
  , which returns a list containing the last element of a nonempty list. Check your rules on queries such as 
  <code>(last-pair (3) ?x)</code>
  , 
  <code>(last-pair (1 2 3) ?x)</code>
  , and 
  <code>(last-pair (2 ?x) (3))</code>
  . Do your rules work correctly on queries such as 
  <code>(last-pair ?x (3))</code>
  ?
  </p>

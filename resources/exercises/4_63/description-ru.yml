name: 'Книга Бытия, 4'
description: |
  <p>Следующая база данных (см. книгу Бытия, 4) содержит генеалогию сыновей Ады вплоть до Адама, через Каина:</p>
  <pre><code>(son Adam Cain)
  (son Cain Enoch)
  (son Enoch Irad)
  (son Irad Mehujael)
  (son Mehujael Methushael)
  (son Methushael Lamech)
  (wife Lamech Ada)
  (son Ada Jabal)
  (son Ada Jubal)
  </code></pre>
  <p>Сформулируйте правила, такие как «Если S сын F, а F сын G, то S внук G» и «Если W жена M, а S сын W, то S также сын M» (предполагается, что в библейские времена это в большей степени соответствовало истине, чем теперь). Эти правила должны позволить системе найти внука Каина; сыновей Ламеха; внуков Мафусала. (В упражнении <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('4.69')) }}">4.69</a>
   можно найти правила, с помощью которых выводятся более сложные родственные связи.)</p>

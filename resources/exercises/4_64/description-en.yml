name: 'An infinite loop'
description: |
  <p>Louis Reasoner mistakenly deletes the outranked-by rule (section 4.4.1) from the data base. When he realizes this, he quickly reinstalls it. Unfortunately, he makes a slight change in the rule, and types it in as</p>
  <pre><code>(rule (outranked-by ?staff-person ?boss)
        (or (supervisor ?staff-person ?boss)
            (and (outranked-by ?middle-manager ?boss)
                 (supervisor ?staff-person ?middle-manager))))
  </code></pre>
  <p>Just after Louis types this information into the system, DeWitt Aull comes by to find out who outranks Ben Bitdiddle. He issues the query</p>
  <pre><code>(outranked-by (Bitdiddle Ben) ?who)
  </code></pre>
  <p>After answering, the system goes into an infinite loop. Explain why.</p>

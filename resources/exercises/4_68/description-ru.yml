name: 'Правила для операции reverse'
description: |
  <p>Определите правила, с помощью которых реализуется операция 
  <code>reverse</code>
   из упражнения 
  <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('2.18')) }}">2.18</a>
  , возвращающая список, элементы которого те же, что и в исходном, но идут в обратном порядке. (Подсказка: используйте 
  <code>append-to-form</code>
  .) Могут ли Ваши правила ответить и на запрос 
  <code>(reverse (1 2 3) ?x)</code>
  , и на 
  <code>(reverse ?x (1 2 3))</code>
  ?
  </p>

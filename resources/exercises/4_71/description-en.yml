name: 'Explicit delay in the simple-query and disjoin procedures'
description: |
  <p>Louis Reasoner wonders why the 
  <code>simple-query</code>
   and 
  <code>disjoin</code>
   procedures (section 4.4.4.2) are implemented using explicit 
  <code>delay</code>
   operations, rather than being defined as follows:
  </p>
  <pre><code>(define (simple-query query-pattern frame-stream)
    (stream-flatmap
     (lambda (frame)
       (stream-append (find-assertions query-pattern frame)
                      (apply-rules query-pattern frame)))
     frame-stream))

  (define (disjoin disjuncts frame-stream)
    (if (empty-disjunction? disjuncts)
        the-empty-stream
        (interleave
         (qeval (first-disjunct disjuncts) frame-stream)
         (disjoin (rest-disjuncts disjuncts) frame-stream))))
  </code></pre>
  <p>Can you give examples of queries where these simpler definitions would lead to undesirable behavior?</p>

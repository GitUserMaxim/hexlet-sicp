name: 'Чередование потоков'
description: |
  <p>Почему 
  <code>disjoin</code>
   и 
  <code>stream-flatmap</code>
   чередуют потоки, а не просто их сцепляют? Приведите примеры, которые показывают, что чередование работает лучше. (Подсказка: зачем мы пользовались 
  <code>interleave</code>
   в разделе 3.5.3?)
  </p>

name: 'Итерационные конструкции'
description: |
  <p>Во многих языках имеются различные конструкции для построения циклов, например, 
  <code>do</code>
  , 
  <code>for</code>
  , 
  <code>while</code>
   и 
  <code>until</code>
  . В Scheme итеративные процессы можно выразить через обычные вызовы процедур, так что особые конструкции не дают никакого существенного выигрыша в вычислительной мощности. С другой стороны, часто они удобны. Придумайте какие-нибудь конструкции для итерации, дайте примеры их использования и покажите, как их реализовать в виде производных выражений.
  </p>

name: 'Определение регистров присутствующих в машине'
description: |
  <p>Модифицируйте имитатор так, чтобы он определял, какие регистры присутствуют в машине, из последовательности команд контроллера, а не принимал список регистров в качестве аргумента 
  <code>make-machine</code>
  . Вместо того, чтобы выделять регистры в 
  <code>make-machine</code>
   заранее, их можно создавать по одному, когда они встречаются в первый раз при ассемблировании команд.
  </p>

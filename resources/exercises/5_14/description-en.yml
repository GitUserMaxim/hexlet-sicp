name: 'The number of pushes and the maximum stack depth required to compute n!'
description: |
  <p>Measure the number of pushes and the maximum stack depth required to compute 
  <code>n!</code>
   for various small values of 
  <code>n</code>
   using the factorial machine shown in figure 5.11. From your data determine formulas in terms of 
  <code>n</code>
   for the total number of push operations and the maximum stack depth used in computing 
  <code>n!</code>
   for any 
  <code>n > 1</code>
  . Note that each of these is a linear function of 
  <code>n</code>
   and is thus determined by two constants. In order to get the statistics printed, you will have to augment the factorial machine with instructions to initialize the stack and print the statistics. You may want to also modify the machine so that it repeatedly reads a value for 
  <code>n</code>
  , computes the factorial, and prints the result (as we did for the GCD machine in figure 5.4), so that you will not have to repeatedly invoke 
  <code>get-register-contents</code>
  , 
  <code>set-register-contents!</code>
  , and 
  <code>start</code>
  .
  </p>
  <img class="img-fluid" src="{{ asset("images/exercises/5_14.gif") }}" alt="5.14">
  <pre><code>(controller
    gcd-loop
      (assign a (op read))
      (assign b (op read))
    test-b
      (test (op =) (reg b) (const 0))
      (branch (label gcd-done))
      (assign t (op rem) (reg a) (reg b))
      (assign a (reg b))
      (assign b (reg t))
      (goto (label test-b))
    gcd-done
      (perform (op print) (reg a))
      (goto (label gcd-loop)))
  </code></pre>
  <p>Figure 5.4:  A GCD machine that reads inputs and prints results.</p>
  <img class="img-fluid" src="{{ asset("images/exercises/5_12.gif") }}" alt="5.12">
  <pre><code>(controller
     (assign continue (label fact-done))     ; set up final return address
   fact-loop
     (test (op =) (reg n) (const 1))
     (branch (label base-case))
     ;; Set up for the recursive call by saving n and continue.
     ;; Set up continue so that the computation will continue
     ;; at after-fact when the subroutine returns.
     (save continue)
     (save n)
     (assign n (op -) (reg n) (const 1))
     (assign continue (label after-fact))
     (goto (label fact-loop))
   after-fact
     (restore n)
     (restore continue)
     (assign val (op *) (reg n) (reg val))   ; val now contains n(n - 1)!
     (goto (reg continue))                   ; return to caller
   base-case
     (assign val (const 1))                  ; base case: 1! = 1
     (goto (reg continue))                   ; return to caller
   fact-done)
  </code></pre>
  <p>Figure 5.11:  A recursive factorial machine.</p>

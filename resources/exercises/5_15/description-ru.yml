name: 'Подсчет команд'
description: |
  <p>Добавьте к модели регистровой машины подсчет команд (instruction counting). Это значит, что машина должна подсчитывать число выполненных ею команд. Расширьте интерфейс модели и добавьте новое сообщение, которое печатает счетчик команд и переустанавливает его в ноль.</p>

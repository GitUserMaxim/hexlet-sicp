name: 'Печать меток'
description: |
  <p>Расширьте трассировку команд из упражнения <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('5.16')) }}">5.16</a>
  так, чтобы перед тем, как печатать команду, имитатор распечатывал метки, которые стоят в последовательности контроллера непосредственно перед этой командой. Постарайтесь при этом не помешать подсчету команд (упражнение <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('5.15')) }}">5.15</a>
  ). Придется заставить имитатор хранить необходимую информацию о метках.</p>

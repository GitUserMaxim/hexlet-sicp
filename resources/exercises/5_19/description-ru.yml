name: 'Контрольные точки'
description: |
  <p>Лиза П. Хакер хочет добавить в имитатор контрольные точки (breakpoints) для облегчения отладки проектов машин. Вас наняли для реализации такой возможности. Лиза хочет, чтобы в последовательности команд контроллера можно было указать место, где имитатор остановится и позволит ей исследовать состояние машины. Вам нужно реализовать процедуру</p>
  <pre><code>(set-breakpoint &lt;machine&gt; &lt;label&gt; &lt;n&gt;)
  </code></pre>
  <p>которая устанавливает контрольную точку перед 
  <code>n</code>
  -й командой, следующей за указанной меткой. Например,
  </p>
  <pre><code>(set-breakpoint gcd-machine 'test-b 4)
  </code></pre>
  <p>установит контрольную точку в 
  <code>gcd-machine</code>
   непосредственно перед присваиванием регистру 
  <code>a</code>
  . Когда моделирование достигает контрольной точки, имитатор должен распечатать метку и смещение точки, а затем прекратить выполнение команд. Тогда Лиза может с помощью 
  <code>get-register-contents</code>
   и 
  <code>set-register-contents!</code>
   исследовать и изменять состояние имитируемой машины. Затем она должна быть способна продолжить выполнение, сказав
  </p>
  <pre><code>(proceed-machine &lt;machine&gt;)
  </code></pre>
  <p>Кроме того, необходимо иметь возможность удалить контрольную точку с помощью</p>
  <pre><code>(cancel-breakpoint &lt;machine&gt; &lt;label&gt; &lt;n&gt;)
  </code></pre>
  <p>и удалить все контрольные точки с помощью</p>
  <pre><code>(cancel-all-breakpoints &lt;machine&gt;)
  </code></pre>

name: 'Регистровые машины для процедур append'
description: |
  <p>В упражнении <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('3.12')) }}">3.12</a>
   из раздела 3.3.1 были представлены процедура 
  <code>append</code>
  , которая добавляет два списка друг к другу и получает третий, и процедура 
  <code>append!</code>
  , которая склеивает два списка вместе.Спроектируйте регистровые машины, которые реализуют каждую из этих процедур. Предполагайте, что операции с памятью, реализующие списковую структуру, являются примитивами.
  </p>

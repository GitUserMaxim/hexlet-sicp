name: 'Сond как новая особая форма'
description: |
  <p>Реализуйте 
  <code>cond</code>
   как новую особую форму, не сводя его к 
  <code>if</code>
  . Придется организовать цикл, проверяющий предикаты последовательных ветвей 
  <code>cond</code>
  , пока один не окажется истинным, а затем с помощью 
  <code>ev-sequence</code>
   выполнять действия этой ветви.
  </p>

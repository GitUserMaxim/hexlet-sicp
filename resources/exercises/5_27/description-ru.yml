name: 'Максимальная глубина стека и общее число сохранений, требуемых для вычисления n!'
description: |
  <p>Для сравнения с упражнением <a href="{{ route('exercises.show', App\Models\Exercise::findByPath('5.26')) }}">5.26</a>
  , изучите поведение следующей процедуры для рекурсивного вычисления факториала:</p>
  <pre><code>(define (factorial n)
    (if (= n 1)
        1
        (* (factorial (- n 1)) n)))
  </code></pre>
  <p>Запуская эту процедуру и отслеживая поведение стека, определите как функции от 
  <code>n</code>
   максимальную глубину стека и общее число сохранений, требуемых для вычисления 
  <code>n!</code>
  , при 
  <code>n ≥ 1</code>
  . (Эти функции также будут линейны.) Опишите общие результаты экспериментов, записав в следующую таблицу соответствующие выражения как формулы, зависящие от 
  <code>n</code>
  :
  </p>
  <img class="img-fluid" src="{{ asset("images/exercises/5_27.gif") }}" alt="5.27">
  <p>Максимальная глубина служит мерой объема памяти, используемой вычислителем при обработке выражения, а количество сохранений хорошо коррелирует со временем вычисления.</p>

name: 'The essential difference between the code for iterative and recursive versions of factorial'
description: |
  <p>Compile the iterative factorial procedure</p>
  <pre><code>(define (factorial n)
    (define (iter product counter)
      (if (> counter n)
          product
          (iter (* counter product)
                (+ counter 1))))
    (iter 1 1))
  </code></pre>
  <p>Annotate the resulting code, showing the essential difference between the code for iterative and recursive versions of 
  <code>factorial</code>
   that makes one process build up stack space and the other run in constant stack space.
  </p>

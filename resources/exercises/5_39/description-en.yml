name: 'lexical-address-lookup and lexical-address-set! procedures'
description: |
  <p>Write a procedure 
  <code>lexical-address-lookup</code>
   that implements the new lookup operation. It should take two arguments -- a lexical address and a run-time environment -- and return the value of the variable stored at the specified lexical address. 
  <code>Lexical-address-lookup</code>
   should signal an error if the value of the variable is the symbol 
  <code>*unassigned*</code>
  . Also write a procedure 
  <code>lexical-address-set!</code>
   that implements the operation that changes the value of the variable at a specified lexical address.
  </p>

name: 'Compile-and-run primitive'
description: |
  <p>The 
  <code>compile-and-go</code>
   interface implemented in this section is awkward, since the compiler can be called only once (when the evaluator machine is started). Augment the compiler-interpreter interface by providing a 
  <code>compile-and-run</code>
   primitive that can be called from within the explicit-control evaluator as follows:
  </p>
  <pre><code>;;; EC-Eval input:
  (compile-and-run
    '(define (factorial n)
      (if (= n 1)
          1
          (* (factorial (- n 1)) n))))

  ;;; EC-Eval value:
  <i>ok</i>

  ;;; EC-Eval input:
  (factorial 5)

  ;;; EC-Eval value:
  <i>120</i>
  </code></pre>
